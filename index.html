<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#8B5E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="شاهي قمرا">
<title>شاهي قمرا</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#F5EFE4;--sur:#FFFFFF;--card:#FDFAF5;--brd:#DDD0B8;
  --gold:#7A5018;--glo:#8B5E1A;--txt:#1E1008;--txt2:#4A2E10;--muted:#9B7B5A;
  --grn:#1A6E3C;--grn-bg:#E8F5EE;--red:#B03020;--red-bg:#FDECEA;
  --ora:#C47B08;--ora-bg:#FEF5E0;--blu:#1255A0;--blu-bg:#E8F0FB;
  --r:12px;--sh:0 2px 12px rgba(139,94,26,.10);--sh2:0 4px 20px rgba(139,94,26,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;
  font-family:'Cairo',sans-serif}
body.bn{font-family:'Hind Siliguri',sans-serif}
body.en{font-family:'Cairo',sans-serif}

/* ── HOME ── */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:2rem;background:linear-gradient(160deg,#FFF8EE 0%,#F0E5D0 100%)}
.logo{text-align:center;margin-bottom:2rem}
.logo .li{font-size:4rem;line-height:1}
.logo h1{font-size:2rem;font-weight:900;color:var(--gold);margin-top:.4rem}
.logo p{color:var(--muted);font-size:.8rem;margin-top:.2rem}
.lang-row{display:flex;gap:.5rem;margin-bottom:1.5rem}
.lang-btn{background:var(--sur);border:1.5px solid var(--brd);border-radius:20px;
  padding:.3rem .85rem;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--muted);
  transition:all .15s}
.lang-btn.on{background:var(--gold);border-color:var(--gold);color:#fff}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;width:100%;max-width:380px}
.role-btn{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  padding:1.3rem 1rem;cursor:pointer;text-align:center;transition:all .18s;
  color:var(--txt);box-shadow:var(--sh)}
.role-btn:active{transform:scale(.96)}
.role-btn .ri{font-size:2rem;display:block;margin-bottom:.3rem}
.role-btn .rn{font-size:.92rem;font-weight:700;display:block;color:var(--txt2)}
.role-btn .rd{font-size:.67rem;color:var(--muted);display:block;margin-top:.12rem}
.role-btn.gold-role{border-color:var(--gold);background:linear-gradient(135deg,#FFF8EC,#FFF0D8)}
.fb-row{display:flex;align-items:center;gap:.4rem;margin-top:1.2rem;font-size:.72rem;color:var(--muted)}
.fb-dot{width:8px;height:8px;border-radius:50%;background:var(--brd);transition:background .4s}
.fb-dot.on{background:var(--grn)}
.fb-dot.err{background:var(--red)}

/* ── PIN ── */
#pin{display:none;min-height:100vh;flex-direction:column;align-items:center;
  justify-content:center;padding:2rem;background:var(--bg)}
.pin-title{font-size:1rem;font-weight:700;color:var(--gold);margin-bottom:.8rem}
.pin-disp{font-size:2.5rem;letter-spacing:.7rem;color:var(--gold);min-height:3rem;
  display:flex;align-items:center;margin:.5rem 0 1.3rem}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;width:100%;max-width:260px}
.pk{background:var(--sur);border:1px solid var(--brd);border-radius:12px;padding:.85rem;
  font-size:1.45rem;font-weight:700;text-align:center;cursor:pointer;color:var(--txt);
  transition:all .12s;box-shadow:var(--sh)}
.pk:active{background:var(--gold);color:#fff;transform:scale(.93)}
.pk.del{color:var(--red)}
.pk.empty{visibility:hidden;pointer-events:none}
.pin-hint{font-size:.7rem;color:var(--muted);margin-top:.5rem}
.pin-err{color:var(--red);font-size:.8rem;margin-top:.5rem;min-height:1.2rem;font-weight:600}
.pin-back{background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;margin-top:1.2rem;text-decoration:underline}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100dvh;height:100vh}
.topbar{background:var(--sur);border-bottom:2px solid var(--brd);padding:.6rem 1rem;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  min-height:52px;box-shadow:0 2px 8px rgba(139,94,26,.08)}
.topbar-l{display:flex;align-items:center;gap:.35rem}
.topbar-r{display:flex;align-items:center;gap:.35rem}
.tb-back{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.2rem .4rem;line-height:1}
.tb-title{font-size:.95rem;font-weight:800;color:var(--gold)}
.tb-sub{font-size:.68rem;color:var(--muted)}
.tb-icon-btn{background:var(--card);border:1px solid var(--brd);border-radius:8px;
  color:var(--txt2);width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;position:relative}
.notif-dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;background:var(--red);
  border-radius:50%;border:2px solid var(--sur)}
.sync-pill{display:flex;align-items:center;gap:.3rem;background:var(--card);
  border:1px solid var(--brd);border-radius:20px;padding:.2rem .55rem;font-size:.65rem;color:var(--muted)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--brd);flex-shrink:0}
.sync-dot.on{background:var(--grn)}
.sync-dot.syncing{background:var(--ora);animation:pls .7s infinite}
.sync-dot.err{background:var(--red)}
#main{flex:1;overflow-y:auto;padding:1rem;-webkit-overflow-scrolling:touch}

/* ── TABLES ── */
.filter-row{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.9rem}
.chip{background:var(--sur);border:1.5px solid var(--brd);border-radius:20px;
  padding:.26rem .78rem;font-size:.73rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .14s}
.chip.on{background:var(--gold);border-color:var(--gold);color:#fff}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:.65rem}
.tc{background:var(--sur);border:2px solid var(--brd);border-radius:var(--r);
  padding:.9rem .4rem;text-align:center;cursor:pointer;transition:all .18s;box-shadow:var(--sh)}
.tc:active{transform:scale(.95)}
.tc.occ{border-color:var(--ora);background:var(--ora-bg)}
.tc.ready{border-color:var(--grn);background:var(--grn-bg)}
.tc .tnum{font-size:1.4rem;font-weight:900;color:var(--gold)}
.tc .tname{font-size:.6rem;color:var(--muted);margin-top:.1rem}
.tc .tdot{width:7px;height:7px;border-radius:50%;background:var(--brd);margin:.3rem auto 0}
.tc.occ .tdot{background:var(--ora)}
.tc.ready .tdot{background:var(--grn)}
.tc .tstat{font-size:.58rem;font-weight:700;margin-top:.2rem}
.tc.occ .tstat{color:var(--ora)}
.tc.ready .tstat{color:var(--grn)}
.tc .tamt{font-size:.6rem;color:var(--muted);margin-top:.15rem}

/* ── MENU ── */
.cats{display:flex;gap:.4rem;overflow-x:auto;padding-bottom:.4rem;margin-bottom:.8rem;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-b{white-space:nowrap;background:var(--sur);border:1.5px solid var(--brd);border-radius:20px;
  padding:.28rem .85rem;color:var(--muted);font-size:.76rem;font-weight:700;cursor:pointer;transition:all .14s;flex-shrink:0}
.cat-b.on{background:var(--gold);border-color:var(--gold);color:#fff}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(146px,1fr));gap:.65rem}
.mi{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  overflow:hidden;transition:all .14s;box-shadow:var(--sh)}
.mi.in-cart{border-color:var(--gold)}
.mi img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.mi-ph{width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:2.4rem}
.mi-body{padding:.48rem .6rem}
.mi-name{font-size:.76rem;font-weight:600;color:var(--txt2);line-height:1.3;min-height:2rem}
.mi-price{font-size:.8rem;font-weight:700;color:var(--gold);margin-top:.18rem}
.mi-opts-tag{font-size:.6rem;color:var(--muted)}
.mi-ctrl{display:flex;align-items:center;justify-content:space-between;
  padding:.38rem .6rem;border-top:1px solid var(--brd);background:var(--card)}
.qbtn{background:var(--brd);border:none;color:var(--txt);width:29px;height:29px;border-radius:50%;
  font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.qbtn:active{background:var(--gold);color:#fff}
.qbtn.add{background:var(--gold);color:#fff}
.qnum{font-weight:700;font-size:.9rem;min-width:20px;text-align:center;color:var(--txt2)}
.search-box{width:100%;background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  padding:.58rem .9rem;color:var(--txt);font-size:.88rem;margin-bottom:.8rem}
.search-box:focus{outline:none;border-color:var(--gold)}

/* ── OPTIONS SHEET ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:400;display:none;align-items:flex-end}
.ovl.open{display:flex}
.sheet{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;animation:sup .24s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-head{padding:1.1rem 1.1rem .7rem;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--sur);z-index:1}
.sh-item-row{display:flex;gap:.8rem;align-items:center}
.sh-img{width:58px;height:58px;border-radius:10px;object-fit:cover;flex-shrink:0}
.sh-img-ph{width:58px;height:58px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.7rem;flex-shrink:0}
.sh-item-name{font-size:.95rem;font-weight:800;color:var(--txt);line-height:1.2}
.sh-item-price{font-size:.9rem;font-weight:700;color:var(--gold);margin-top:.18rem}
.sh-body{padding:.8rem 1rem .9rem}
.opt-grp{margin-bottom:.9rem}
.og-lbl{font-size:.76rem;font-weight:700;color:var(--txt2);margin-bottom:.45rem;display:flex;align-items:center;gap:.35rem}
.og-req{font-size:.63rem;background:var(--red-bg);color:var(--red);padding:.08rem .38rem;border-radius:20px;font-weight:600}
.og-opt{font-size:.63rem;background:var(--ora-bg);color:var(--ora);padding:.08rem .38rem;border-radius:20px;font-weight:600}
.choices{display:flex;flex-wrap:wrap;gap:.4rem}
.oc{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;
  padding:.32rem .8rem;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--txt2);transition:all .14s}
.oc:active{transform:scale(.94)}
.oc.sel{background:var(--gold);border-color:var(--gold);color:#fff}
.oc .diff{font-size:.67rem;font-weight:400}
.qty-row{display:flex;align-items:center;gap:.7rem}
.qty-lbl{flex:1;font-size:.8rem;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;gap:.45rem}
.qs{background:var(--brd);border:none;color:var(--txt);width:31px;height:31px;border-radius:50%;font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qs:active{background:var(--gold);color:#fff}
.qsn{font-size:.95rem;font-weight:700;min-width:20px;text-align:center}
.sh-foot{padding:.8rem 1rem 1.1rem;border-top:1px solid var(--brd);display:flex;gap:.6rem;position:sticky;bottom:0;background:var(--sur)}
.sh-cancel{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);padding:.65rem 1.1rem;font-size:.85rem;font-weight:700;cursor:pointer;color:var(--muted)}
.sh-add{flex:1;background:var(--gold);color:#fff;border:none;border-radius:var(--r);padding:.65rem;font-size:.88rem;font-weight:800;cursor:pointer}
.sh-add:disabled{background:var(--brd);color:var(--muted)}

/* ── ORDER DETAIL ── */
.odc{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:1rem;box-shadow:var(--sh)}
.odc-h{background:var(--bg);padding:.65rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.odc-h h3{font-size:.88rem;font-weight:700;color:var(--txt2)}
.odc-items{padding:.4rem 0}
.odc-item{padding:.42rem 1rem;border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;gap:.55rem}
.odc-item:last-child{border-bottom:none}
.odc-qty{background:var(--gold);color:#fff;width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:1px}
.odc-info{flex:1}
.odc-name{font-size:.8rem;font-weight:600;color:var(--txt2)}
.odc-opts{font-size:.68rem;color:var(--muted);margin-top:.1rem}
.odc-price{font-size:.78rem;font-weight:700;color:var(--gold)}
.odc-foot{padding:.65rem 1rem;border-top:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.odc-total{font-size:.95rem;font-weight:800;color:var(--gold)}
.odc-actions{display:flex;gap:.45rem;padding:.65rem 1rem}

/* ── CART FAB ── */
.cart-fab{position:fixed;bottom:1.1rem;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#fff;border:none;border-radius:50px;padding:.75rem 1.6rem;
  font-size:.88rem;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(122,80,24,.42);
  display:flex;align-items:center;gap:.4rem;z-index:200;white-space:nowrap}
.cart-fab:active{transform:translateX(-50%) scale(.96)}

/* ── CART SHEET ── */
.cart-ovl{position:fixed;inset:0;background:rgba(0,0,0,.33);z-index:300;display:none;align-items:flex-end}
.cart-ovl.open{display:flex}
.cart-sheet{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-height:84vh;overflow-y:auto;padding:1.3rem;animation:sup .25s ease}
.cs-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:.85rem;padding-bottom:.65rem;border-bottom:1.5px solid var(--brd)}
.cs-head h3{font-size:.9rem;font-weight:800;color:var(--txt2)}
.xbtn{background:var(--bg);border:1px solid var(--brd);color:var(--muted);width:29px;height:29px;border-radius:50%;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ci{padding:.52rem 0;border-bottom:1px solid var(--brd)}
.ci-top{display:flex;align-items:center;gap:.55rem}
.ci-ctrl{display:flex;align-items:center;gap:.28rem}
.ciq{background:var(--brd);border:none;color:var(--txt);width:25px;height:25px;border-radius:50%;font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ciq.plus{background:var(--gold);color:#fff}
.ci-name{flex:1;font-size:.83rem;font-weight:600;color:var(--txt2)}
.ci-price{color:var(--gold);font-size:.8rem;font-weight:700}
.ci-opts{font-size:.68rem;color:var(--muted);margin:.08rem 0 0 58px}
textarea.note{width:100%;background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);
  padding:.55rem .85rem;color:var(--txt);font-size:.83rem;margin:.8rem 0 .45rem;resize:none;height:62px}
textarea.note:focus{outline:none;border-color:var(--gold)}
.ctotal{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;
  font-weight:700;font-size:.9rem;border-bottom:1.5px solid var(--brd);margin-bottom:.65rem}
.ctotal-amt{color:var(--gold);font-size:1.15rem;font-weight:900}
.send-btn{width:100%;background:var(--grn);color:#fff;border:none;border-radius:var(--r);
  padding:.82rem;font-size:.9rem;font-weight:800;cursor:pointer}
.send-btn:disabled{background:var(--brd);color:var(--muted)}

/* ── KITCHEN ── */
.k-toolbar{display:flex;gap:.4rem;margin-bottom:.85rem;flex-wrap:wrap}
.kord{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:.8rem;box-shadow:var(--sh)}
.kord.new{border-color:var(--red);border-width:2px}
.kord.prep{border-color:var(--ora);border-width:2px}
.kord-h{background:var(--bg);padding:.58rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.kord-t{font-size:.85rem;font-weight:700;color:var(--txt2)}
.kord-items{padding:.35rem 0}
.koi{display:flex;align-items:flex-start;gap:.5rem;padding:.4rem 1rem;border-bottom:1px solid var(--brd)}
.koi:last-child{border-bottom:none}
.koi-qty{background:var(--gold);color:#fff;width:23px;height:23px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;flex-shrink:0;margin-top:1px}
.koi-info{flex:1}
.koi-name{font-size:.8rem;font-weight:600;color:var(--txt2)}
.koi-opts{font-size:.67rem;color:var(--muted);margin-top:.08rem}
.koi.done .koi-name{text-decoration:line-through;color:var(--muted)}
.koi.done .koi-qty{background:var(--grn)}
.item-chk{background:var(--sur);border:1.5px solid var(--brd);color:var(--muted);
  border-radius:6px;padding:.18rem .45rem;font-size:.67rem;cursor:pointer;transition:all .14s;flex-shrink:0}
.item-chk.done{background:var(--grn);border-color:var(--grn);color:#fff}
.kord-note{background:var(--ora-bg);border-top:1px solid var(--brd);padding:.42rem 1rem;font-size:.72rem;color:var(--ora)}
.kord-foot{padding:.58rem 1rem;display:flex;gap:.45rem;background:var(--bg);border-top:1px solid var(--brd)}
.k-btn{flex:1;border:none;border-radius:8px;padding:.52rem;font-size:.8rem;font-weight:700;cursor:pointer}
.k-green{background:var(--grn);color:#fff}
.k-ora{background:var(--ora);color:#fff}
.k-grey{background:var(--muted);color:#fff}
.k-cancel{background:none;border:1.5px solid var(--red);color:var(--red);border-radius:8px;padding:.52rem .75rem;font-size:.8rem;font-weight:700;cursor:pointer}
.ks{display:inline-block;padding:.13rem .48rem;border-radius:20px;font-size:.66rem;font-weight:700}
.ks.new{background:var(--red-bg);color:var(--red)}
.ks.prep{background:var(--ora-bg);color:var(--ora)}
.ks.ready{background:var(--grn-bg);color:var(--grn)}
.ks.paid{background:var(--blu-bg);color:var(--blu)}
.k-min{font-size:.66rem;padding:.12rem .42rem;border-radius:20px;background:var(--bg);color:var(--muted)}
.k-min.urg{background:var(--red-bg);color:var(--red)}
.pulse{animation:pls 1.1s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}

/* ── CASHIER ── */
.bill{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);overflow:hidden;margin-bottom:.8rem;box-shadow:var(--sh)}
.bill-h{background:var(--bg);padding:.58rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.bill-items{padding:.38rem 1rem}
.bill-item{display:flex;flex-direction:column;padding:.28rem 0;border-bottom:1px solid var(--brd)}
.bill-item:last-child{border-bottom:none}
.bill-item-top{display:flex;justify-content:space-between;font-size:.8rem}
.bill-item-opts{font-size:.67rem;color:var(--muted);margin-top:.08rem}
.bill-foot{padding:.58rem 1rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--brd);background:var(--bg)}
.bill-total{font-size:.95rem;font-weight:800;color:var(--gold)}
.pay-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:.38rem 1rem;font-size:.8rem;font-weight:700;cursor:pointer}
.pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin:.8rem 0}
.pm-btn{background:var(--card);border:2px solid var(--brd);border-radius:var(--r);padding:.85rem;text-align:center;cursor:pointer;transition:all .17s}
.pm-btn.sel{border-color:var(--gold);background:linear-gradient(135deg,#FFF8EC,#FFF0D8)}
.pm-ic{font-size:1.45rem;display:block;margin-bottom:.22rem}
.pm-lb{font-size:.8rem;font-weight:700;color:var(--txt2)}

/* ── ADMIN ── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.55rem;margin-bottom:1.1rem}
.scard{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);padding:.85rem;text-align:center;box-shadow:var(--sh)}
.snum{font-size:1.7rem;font-weight:900;color:var(--gold)}
.slbl{font-size:.68rem;color:var(--muted);margin-top:.12rem;font-weight:600}
.atabs{display:flex;border-bottom:2px solid var(--brd);margin-bottom:.85rem;overflow-x:auto;scrollbar-width:none}
.atabs::-webkit-scrollbar{display:none}
.atab{padding:.48rem .8rem;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;margin-bottom:-2px}
.atab.on{border-bottom-color:var(--gold);color:var(--gold)}
.sec-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.sec-ttl{font-size:.85rem;font-weight:800;color:var(--gold)}
.btn-add{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:.28rem .7rem;font-size:.74rem;font-weight:700;cursor:pointer}
.arow{background:var(--sur);border:1px solid var(--brd);border-radius:8px;padding:.58rem;display:flex;align-items:center;gap:.55rem;margin-bottom:.42rem;box-shadow:var(--sh)}
.arow img{width:42px;height:42px;border-radius:6px;object-fit:cover;flex-shrink:0}
.ar-ph{width:42px;height:42px;border-radius:6px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.ar-info{flex:1;min-width:0}
.ar-name{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt2)}
.ar-price{font-size:.73rem;color:var(--gold);font-weight:700}
.ar-cat{font-size:.65rem;color:var(--muted)}
.ebtn{background:none;border:1px solid var(--brd);color:var(--muted);border-radius:5px;padding:.16rem .45rem;font-size:.68rem;cursor:pointer}
.dbtn{background:none;border:1px solid rgba(176,48,32,.3);color:var(--red);border-radius:5px;padding:.16rem .45rem;font-size:.68rem;cursor:pointer}
.tbtn{background:none;border:1px solid var(--brd);color:var(--muted);border-radius:5px;padding:.16rem .45rem;font-size:.68rem;cursor:pointer}

/* ── MODAL ── */
.modal-ovl{position:fixed;inset:0;background:rgba(0,0,0,.33);z-index:500;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-ovl.open{display:flex}
.modal{background:var(--sur);border:1.5px solid var(--brd);border-radius:16px;padding:1.3rem;width:100%;max-width:380px;animation:mfade .18s ease;max-height:90vh;overflow-y:auto;box-shadow:var(--sh2)}
@keyframes mfade{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.modal h3{font-size:.92rem;font-weight:800;color:var(--gold);margin-bottom:.85rem}
.ff{margin-bottom:.6rem}
.ff label{display:block;font-size:.74rem;color:var(--muted);margin-bottom:.18rem;font-weight:600}
.fi{width:100%;background:var(--card);border:1.5px solid var(--brd);border-radius:8px;padding:.48rem .78rem;color:var(--txt);font-size:.84rem}
.fi:focus{outline:none;border-color:var(--gold)}
.ma{display:flex;gap:.45rem;margin-top:.85rem}
.btn-p{flex:1;background:var(--gold);color:#fff;border:none;border-radius:8px;padding:.58rem;font-size:.84rem;font-weight:700;cursor:pointer}
.btn-s{background:var(--card);color:var(--muted);border:1.5px solid var(--brd);border-radius:8px;padding:.58rem .95rem;font-size:.84rem;cursor:pointer}
.btn-d{flex:1;background:var(--red);color:#fff;border:none;border-radius:8px;padding:.58rem;font-size:.84rem;font-weight:700;cursor:pointer}

/* ── RECEIPT ── */
.receipt{background:#fff;color:#222;border-radius:var(--r);padding:1.1rem;font-size:.78rem;direction:rtl;border:1px solid #ddd}
.receipt h4{text-align:center;font-size:.95rem;font-weight:800;margin-bottom:.38rem}
.receipt .rdate{text-align:center;color:#999;font-size:.68rem;margin-bottom:.6rem}
.receipt .rl{padding:.28rem 0;border-bottom:1px dashed #eee}
.receipt .rl-top{display:flex;justify-content:space-between;font-size:.76rem}
.receipt .rl-opts{font-size:.66rem;color:#aaa;margin-top:.06rem}
.receipt .rt{display:flex;justify-content:space-between;font-weight:800;font-size:.9rem;padding-top:.45rem}
.receipt .rthanks{text-align:center;color:#aaa;font-size:.68rem;margin-top:.6rem}
.print-btn{width:100%;background:var(--gold);color:#fff;border:none;border-radius:8px;padding:.58rem;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:.6rem}

/* ── TOAST ── */
.toast{position:fixed;bottom:4.2rem;left:50%;transform:translateX(-50%);
  background:var(--grn);color:#fff;padding:.52rem 1.2rem;border-radius:50px;
  font-size:.8rem;font-weight:700;z-index:1000;opacity:0;transition:opacity .2s;
  white-space:nowrap;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,.14)}
.toast.show{opacity:1}
.toast.err{background:var(--red)}
.toast.warn{background:var(--ora)}
.ordr-note{background:var(--ora-bg);border:1px solid rgba(196,123,8,.2);border-radius:6px;padding:.32rem .65rem;font-size:.7rem;color:var(--ora);margin:.32rem 1rem}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty .ei{font-size:2.6rem;margin-bottom:.6rem}
.empty p{font-size:.8rem}
.sep{height:1px;background:var(--brd);margin:.65rem 0}
@media print{body{background:#fff}.topbar,.cart-fab,.toast{display:none!important}}
@media(min-width:480px){.mgrid{grid-template-columns:repeat(auto-fill,minmax(165px,1fr))}.tgrid{grid-template-columns:repeat(auto-fill,minmax(98px,1fr))}}

<!-- HOME -->
<div id="home">
  <div class="logo">
    <div class="li">🫖</div>
    <h1>شاهي قمرا</h1>
    <p id="home-sub">نظام إدارة الطلبات</p>
  </div>
  <div class="lang-row">
    <button class="lang-btn on" onclick="setLang('ar')">العربية</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('bn')">বাংলা</button>
  </div>
  <div class="role-grid">
    <button class="role-btn" onclick="startRole('waiter')">
      <span class="ri">🧑‍🍳</span><span class="rn" id="r-waiter">نادل</span><span class="rd" id="rd-waiter">الطاولات والطلبات</span>
    </button>
    <button class="role-btn" onclick="startRole('kitchen')">
      <span class="ri">🔥</span><span class="rn" id="r-kitchen">المطبخ</span><span class="rd" id="rd-kitchen">عرض الطلبات</span>
    </button>
    <button class="role-btn" onclick="startRole('cashier')">
      <span class="ri">💰</span><span class="rn" id="r-cashier">كاشير</span><span class="rd" id="rd-cashier">الدفع والفاتورة</span>
    </button>
    <button class="role-btn gold-role" onclick="startRole('admin')">
      <span class="ri">⚙️</span><span class="rn" id="r-admin">الإدارة</span><span class="rd" id="rd-admin">تحكم كامل</span>
    </button>
  </div>
  <div class="fb-row">
    <div class="fb-dot" id="fb-dot"></div>
    <span id="fb-txt">جارٍ الاتصال...</span>
  </div>
</div>

<!-- PIN -->
<div id="pin">
  <div class="pin-title" id="pin-title">🔐 رمز الإدارة</div>
  <div class="pin-disp" id="pin-disp"></div>
  <div class="pin-grid">
    <button class="pk" onclick="pk('1')">١</button><button class="pk" onclick="pk('2')">٢</button><button class="pk" onclick="pk('3')">٣</button>
    <button class="pk" onclick="pk('4')">٤</button><button class="pk" onclick="pk('5')">٥</button><button class="pk" onclick="pk('6')">٦</button>
    <button class="pk" onclick="pk('7')">٧</button><button class="pk" onclick="pk('8')">٨</button><button class="pk" onclick="pk('9')">٩</button>
    <button class="pk empty"></button><button class="pk" onclick="pk('0')">٠</button><button class="pk del" onclick="pkd()">⌫</button>
  </div>
  <div class="pin-hint" id="pin-hint">الرمز الافتراضي: 9999</div>
  <div class="pin-err" id="pin-err"></div>
  <button class="pin-back" onclick="showHome()" id="pin-back">← رجوع</button>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-l">
      <button class="tb-back" id="tb-back-btn" onclick="goBack()">←</button>
      <div><div class="tb-title" id="tb-title">-</div><div class="tb-sub" id="tb-sub"></div></div>
    </div>
    <div class="topbar-r" id="tb-right"></div>
  </div>
  <div id="main"></div>
</div>

<!-- Options Sheet -->
<div class="ovl" id="opts-ovl" onclick="closeOpts()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sh-head">
      <div class="sh-item-row">
        <div id="sh-img-wrap"></div>
        <div><div class="sh-item-name" id="sh-name"></div><div class="sh-item-price" id="sh-price"></div></div>
      </div>
    </div>
    <div class="sh-body" id="sh-body"></div>
    <div class="sh-foot">
      <button class="sh-cancel" onclick="closeOpts()" id="sh-cancel-btn">إلغاء</button>
      <button class="sh-add" id="sh-add-btn" onclick="confirmOpts()">إضافة</button>
    </div>
  </div>
</div>

<!-- Cart Sheet -->
<div class="cart-ovl" id="cart-ovl" onclick="closeCart()">
  <div class="cart-sheet" onclick="event.stopPropagation()">
    <div class="cs-head">
      <h3 id="cs-title">🛒</h3>
      <button class="xbtn" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-items"></div>
    <textarea class="note" id="cart-note" placeholder="..."></textarea>
    <div class="ctotal"><span id="ctotal-lbl">المجموع</span><span class="ctotal-amt" id="cart-total">0</span></div>
    <button class="send-btn" onclick="sendOrder()" id="send-btn">✅ إرسال للمطبخ</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-ovl" id="modal-ovl" onclick="closeModal()">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>

const FB_CFG={
  projectId:'nadelapp-9ec65',
  databaseURL:'https://nadelapp-9ec65-default-rtdb.europe-west1.firebasedatabase.app',
};
let fbApp,fbDb,fbOnline=false,fbRef;
function initFb(){
  try{
    fbApp=firebase.initializeApp(FB_CFG);
    fbDb=firebase.database();
    fbRef=fbDb.ref('/');
    // Test connection
    fbDb.ref('.info/connected').on('value',snap=>{
      fbOnline=!!snap.val();
      updateFbUI();
      if(fbOnline&&S.screen==='kitchen')renderKitchenContent();
      if(fbOnline&&S.screen==='cashier')renderCashierContent();
    });
    // Real-time orders listener
    fbDb.ref('orders').on('value',snap=>{
      const data=snap.val();
      if(data&&Array.isArray(data)&&data.length){
        LS.set('qamra_orders',data);
        if(S.screen==='kitchen')renderKitchenContent();
        else if(S.screen==='cashier')renderCashierContent();
        else if(S.screen==='tables')renderTables();
      }
    });
  }catch(e){fbOnline=false;updateFbUI();}
}
function fbSave(orders){
  if(!fbDb||!fbOnline)return;
  fbDb.ref('orders').set(orders).catch(()=>{fbOnline=false;updateFbUI();});
}
function updateFbUI(){
  const dot=document.getElementById('fb-dot');
  const txt=document.getElementById('fb-txt');
  const sdot=document.querySelector('.sync-dot');
  if(dot){dot.className='fb-dot'+(fbOnline?' on':' err');}
  if(txt)txt.textContent=fbOnline?T('connectedFb'):T('offlineFb');
  if(sdot)sdot.className='sync-dot'+(fbOnline?' on':' err');
}

}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
function showHome(){
  document.getElementById('home').style.display='';
  document.getElementById('pin').style.display='none';
  document.getElementById('app').style.display='none';
  S.role=null;S.nav=[];S.cart={};stopRefresh();updateFbUI();
}
function startRole(r){
  if(r==='admin'){S.pinBuf='';document.getElementById('pin-disp').textContent='';document.getElementById('pin-err').textContent='';
    document.getElementById('home').style.display='none';document.getElementById('pin').style.display='flex';return;}
  S.role=r;openApp();
  if(r==='waiter')nav('tables');else if(r==='kitchen')nav('kitchen');else nav('cashier');
}
function pk(d){if(S.pinBuf.length>=6)return;S.pinBuf+=d;document.getElementById('pin-disp').textContent='●'.repeat(S.pinBuf.length);if(S.pinBuf.length>=4)chkPin();}
function pkd(){S.pinBuf=S.pinBuf.slice(0,-1);document.getElementById('pin-disp').textContent='●'.repeat(S.pinBuf.length);}
function chkPin(){
  if(S.pinBuf===String(getSettings().pin)){
    document.getElementById('pin').style.display='none';S.role='admin';openApp();nav('admin');
  }else{
    setTimeout(()=>{document.getElementById('pin-err').textContent=T('pinErr');S.pinBuf='';document.getElementById('pin-disp').textContent='';},200);
  }
}
function openApp(){
  document.getElementById('home').style.display='none';document.getElementById('pin').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
}
function nav(screen,params={}){S.nav.push({screen,params});render(screen,params);}
function goBack(){
  if(S.nav.length<=1){showHome();return;}
  S.nav.pop();const prev=S.nav[S.nav.length-1];S.cart={};render(prev.screen,prev.params);
}
function render(screen,params={}){
  S.screen=screen;document.getElementById('main').scrollTop=0;
  document.querySelector('.cart-fab')?.remove();stopRefresh();
  switch(screen){
    case'tables':renderTables();break;case'table-detail':renderTableDetail(params.tableId);break;
    case'menu':S.tableId=params.tableId;renderMenu();break;
    case'kitchen':renderKitchen();startRefresh();break;
    case'cashier':renderCashier();startRefresh();break;
    case'admin':renderAdmin();break;default:renderTables();
  }
}
function setTitle(m,s=''){document.getElementById('tb-title').textContent=m;document.getElementById('tb-sub').textContent=s;}
function showBack(v){const b=document.getElementById('tb-back-btn');b.style.opacity=v?'1':'0';b.style.pointerEvents=v?'':'none';}
function setRight(h){document.getElementById('tb-right').innerHTML=h;updateFbUI();}
function syncPill(){return`<div class="sync-pill"><div class="sync-dot ${fbOnline?'on':'err'}"></div><span>${fbOnline?T('connectedFb'):T('offlineFb')}</span></div>`;}
let refreshInt=null;
function startRefresh(){stopRefresh();refreshInt=setInterval(()=>{if(S.screen==='kitchen')renderKitchenContent();else if(S.screen==='cashier')renderCashierContent();},5000);}
function stopRefresh(){if(refreshInt){clearInterval(refreshInt);refreshInt=null;}}
function catLabel(c){return lang==='en'?c.en:lang==='bn'?c.nb:c.n;}
function itmName(item){return item.n;}// always show Arabic name (menu source is AR)

/* ══════════════════════════════════════════
   TABLES
══════════════════════════════════════════ */
function renderTables(){
  setTitle(T('tables'),{waiter:T('waiter'),cashier:T('cashier'),admin:T('admin')}[S.role]||'');
  showBack(false);setRight(`${syncPill()}<button class="tb-icon-btn" onclick="showHome()">🏠</button>`);
  const tbls=getTables().filter(t=>t.active);
  const fil=S.tblFilter==='all'?tbls:tbls.filter(t=>tblStatus(t.id)===S.tblFilter);
  const fOpts=[{id:'all',k:'all'},{id:'free',k:'free'},{id:'occ',k:'busy'},{id:'ready',k:'ready'}];
  let h=`<div class="filter-row">${fOpts.map(f=>`<button class="chip ${S.tblFilter===f.id?'on':''}" onclick="setTF('${f.id}')">${T(f.k)}</button>`).join('')}</div>`;
  h+=!fil.length?`<div class="empty"><div class="ei">🪑</div><p>${T('noTables')}</p></div>`:`<div class="tgrid">${fil.map(t=>{
    const st=tblStatus(t.id);const act=tblActive(t.id);
    const cls=st==='free'?'':st==='occ'?'occ':'ready';
    const stTxt=st==='free'?T('free'):st==='occ'?T('busy'):T('ready');
    return `<div class="tc ${cls}" onclick="onTbl(${t.id})">
      <div class="tnum">${t.id}</div><div class="tname">${t.name}</div>
      <div class="tdot"></div><div class="tstat">${stTxt}</div>
      ${act?`<div class="tamt">${oTotal(act)}${T('currency')}</div>`:''}
    </div>`;
  }).join('')}</div>`;
  document.getElementById('main').innerHTML=h;
}
function setTF(f){S.tblFilter=f;renderTables();}
function onTbl(id){tblActive(id)?nav('table-detail',{tableId:id}):(S.cart={},nav('menu',{tableId:id}));}

/* ══════════════════════════════════════════
   TABLE DETAIL
══════════════════════════════════════════ */
function renderTableDetail(tid){
  S.tableId=tid;
  const tbl=getTables().find(t=>t.id===tid);
  const order=tblActive(tid);
  setTitle(tbl?tbl.name:T('tableN')+tid,T('activeOrder'));showBack(true);setRight(syncPill());
  if(!order){nav('menu',{tableId:tid});return;}
  const items=getItems();
  const stCls={new:'new',prep:'prep',ready:'ready'}[order.status]||'';
  const stTxt=T('orderStatus')[order.status]||order.status;
  const ih=order.items.map(oi=>{
    const optsV=oi.opts&&Object.keys(oi.opts).length?Object.values(oi.opts).join(' · '):'';
    return `<div class="odc-item"><div class="odc-qty">${oi.qty}</div>
      <div class="odc-info"><div class="odc-name">${oi.name}</div>${optsV?`<div class="odc-opts">${optsV}</div>`:''}</div>
      <div class="odc-price">${oi.price*oi.qty}${T('currency')}</div></div>`;
  }).join('');
  document.getElementById('main').innerHTML=`<div class="odc">
    <div class="odc-h"><h3>${T('orderN')}${order.id} — ${tAgo(order.createdAt)}</h3><span class="ks ${stCls}">${stTxt}</span></div>
    <div class="odc-items">${ih}</div>
    ${order.notes?`<div class="ordr-note">${T('notes')} ${order.notes}</div>`:''}
    <div class="odc-foot"><span>${T('total')}</span><span class="odc-total">${oTotal(order)}${T('currency')}</span></div>
    <div class="odc-actions">
      <button class="btn-p" onclick="addToOrd(${tid})">➕</button>
      ${order.status!=='ready'?`<button class="btn-s" style="flex:1" onclick="mReady(${order.id},${tid})">${T('markReady')}</button>`:''}
      <button style="background:var(--blu);color:#fff;border:none;border-radius:8px;padding:.6rem;font-size:.84rem;font-weight:700;cursor:pointer;flex:1" onclick="openPay(${order.id})">${T('pay')}</button>
    </div></div>`;
}
function addToOrd(tid){S.cart={};nav('menu',{tableId:tid,addingTo:tblActive(tid)?.id});}
function mReady(oid,tid){const o=getOrders();const i=o.findIndex(x=>x.id===oid);if(i>=0){o[i].status='ready';saveOrders(o);}showToast(T('markReady'));renderTableDetail(tid);}

/* ══════════════════════════════════════════
   MENU
══════════════════════════════════════════ */
function renderMenu(){
  const tbl=getTables().find(t=>t.id===S.tableId);
  setTitle(T('menu'),tbl?tbl.name:T('tableN')+S.tableId);showBack(true);
  const allItems=getItems().filter(i=>i.available!==false);
  const catItems=S.search?allItems.filter(i=>i.n.includes(S.search)):allItems.filter(i=>i.c===S.cat);
  const cats=CATS.filter(c=>allItems.some(i=>i.c===c.id));
  const catH=`<div class="cats">${cats.map(c=>`<button class="cat-b ${S.cat===c.id&&!S.search?'on':''}" onclick="setCat('${c.id}')">${c.e} ${catLabel(c)}</button>`).join('')}</div>`;
  const inCartIds=new Set(Object.keys(S.cart).map(k=>k.split('__')[0]));
  let ig='';
  if(!catItems.length)ig=`<div class="empty"><div class="ei">🔍</div><p>${T('noItems')}</p></div>`;
  else{
    ig=`<div class="mgrid">${catItems.map(item=>{
      const hasO=!!getItemOpts(item);
      const inC=inCartIds.has(item.id);
      const tq=Object.entries(S.cart).filter(([k])=>k===item.id||k.startsWith(item.id+'__')).reduce((s,[,v])=>s+v.qty,0);
      return `<div class="mi ${inC?'in-cart':''}" id="mi-${item.id}">
        ${item.img?`<img src="${item.img}" loading="lazy" alt="${item.n}">`:`<div class="mi-ph">🍽️</div>`}
        <div class="mi-body">
          <div class="mi-name">${item.n}</div>
          <div class="mi-price">${item.p}${T('currency')}${hasO?' ~':''}</div>
          ${hasO?`<div class="mi-opts-tag">⚙ ${T('optional')}</div>`:''}
        </div>
        <div class="mi-ctrl">
          ${tq>0&&!hasO?
            `<button class="qbtn" onclick="dMinus('${item.id}',${item.p})">−</button><span class="qnum">${tq}</span><button class="qbtn add" onclick="dAdd('${item.id}',${item.p})">+</button>`:
            `<span></span><span style="font-size:.7rem;color:var(--muted)">${tq>0?'×'+tq:''}</span><button class="qbtn add" onclick="openOpts('${item.id}')">${hasO?'⚙':'+' }</button>`}
        </div></div>`;
    }).join('')}</div>`;
  }
  document.getElementById('main').innerHTML=`<input class="search-box" type="search" placeholder="${T('search')}" value="${S.search}" oninput="doSrch(this.value)">${catH}${ig}`;
  updFab();
  setRight(`${syncPill()}<button class="tb-icon-btn" onclick="openCart()" style="position:relative">🛒${cartN()>0?'<span class="notif-dot"></span>':''}</button>`);
}
function setCat(id){S.cat=id;S.search='';renderMenu();}
function doSrch(v){S.search=v;renderMenu();}
function dAdd(id,p){if(!S.cart[id])S.cart[id]={itemId:id,qty:0,price:p,opts:{}};S.cart[id].qty++;renderMenu();}
function dMinus(id){if(!S.cart[id])return;S.cart[id].qty--;if(S.cart[id].qty<=0)delete S.cart[id];renderMenu();}
function cartN(){return Object.values(S.cart).reduce((a,v)=>a+v.qty,0);}
function cartAmt(){return Object.values(S.cart).reduce((s,v)=>s+(v.price*v.qty),0);}
function updFab(){
  let f=document.querySelector('.cart-fab');const n=cartN();
  if(!n){f?.remove();return;}
  if(!f){f=document.createElement('button');f.className='cart-fab';f.onclick=openCart;document.body.appendChild(f);}
  f.innerHTML=`🛒 ${T('cartTitle')} · ${n} · ${cartAmt()}${T('currency')}`;
}

/* ══════════════════════════════════════════
   OPTIONS
══════════════════════════════════════════ */
function openOpts(itemId){
  const item=getItems().find(i=>i.id===itemId);if(!item)return;
  const gs=getItemOpts(item);
  S.optsItem=item;S.optsQty=1;S.optsSel={};
  if(gs)gs.forEach(g=>{if(g.req&&g.choices.length)S.optsSel[g.id]=g.choices[0].id;});
  if(!gs||!gs.length){dAdd(itemId,item.p);return;}
  document.getElementById('sh-name').textContent=item.n;
  document.getElementById('sh-img-wrap').innerHTML=item.img?`<img src="${item.img}" class="sh-img">`:` <div class="sh-img-ph">🍽️</div>`;
  document.getElementById('sh-cancel-btn').textContent=T('cancel');
  renderOBody(item,gs);
  document.getElementById('opts-ovl').classList.add('open');
}
function renderOBody(item,gs){
  let h=gs.map(g=>`<div class="opt-grp">
    <div class="og-lbl">${optName(g)} <span class="${g.req?'og-req':'og-opt'}">${T(g.req?'required':'optional')}</span></div>
    <div class="choices">${g.choices.map(c=>`<button class="oc ${S.optsSel[g.id]===c.id?'sel':''}" onclick="selOpt('${g.id}','${c.id}')">
      ${choiceName(c)}${c.d>0?`<span class="diff"> +${c.d}</span>`:''}
    </button>`).join('')}</div></div>`).join('');
  h+=`<div class="opt-grp"><div class="og-lbl">${T('qty')}</div>
    <div class="qty-row"><span class="qty-lbl">${T('itemQty')}</span>
    <div class="qty-ctrl"><button class="qs" onclick="chQty(-1)">−</button><span class="qsn" id="oqty">${S.optsQty}</span><button class="qs" onclick="chQty(1)">+</button></div></div></div>`;
  document.getElementById('sh-body').innerHTML=h;updAddBtn();
}
function selOpt(gid,cid){S.optsSel[gid]=cid;renderOBody(S.optsItem,getItemOpts(S.optsItem));}
function chQty(d){S.optsQty=Math.max(1,S.optsQty+d);const el=document.getElementById('oqty');if(el)el.textContent=S.optsQty;updAddBtn();}
function updAddBtn(){
  const item=S.optsItem;if(!item)return;
  const gs=getItemOpts(item);
  const ok=!gs||gs.filter(g=>g.req).every(g=>S.optsSel[g.id]);
  const btn=document.getElementById('sh-add-btn');if(!btn)return;
  const total=(item.p+optsDiff(item,S.optsSel))*S.optsQty;
  btn.textContent=ok?`${T('add')} ${S.optsQty>1?S.optsQty+'× ':''}· ${total}${T('currency')}`:T('required');
  btn.disabled=!ok;
}
function closeOpts(){document.getElementById('opts-ovl').classList.remove('open');}
function confirmOpts(){
  const item=S.optsItem;if(!item)return;
  const gs=getItemOpts(item);
  if(gs)for(const g of gs)if(g.req&&!S.optsSel[g.id]){showToast(optName(g)+' '+T('required'),'warn');return;}
  const diff=optsDiff(item,S.optsSel);
  const price=item.p+diff;
  const optsLabels={};
  if(gs)gs.forEach(g=>{const c=g.choices.find(x=>x.id===S.optsSel[g.id]);if(c)optsLabels[optName(g)]=choiceName(c);});
  const key=makeKey(item.id,S.optsSel);
  if(S.cart[key])S.cart[key].qty+=S.optsQty;
  else S.cart[key]={itemId:item.id,qty:S.optsQty,price,opts:optsLabels,optsRaw:S.optsSel};
  closeOpts();showToast(`${T('added')} × ${S.optsQty}`);renderMenu();
}

/* ══════════════════════════════════════════
   CART
══════════════════════════════════════════ */
function getItemName(id){return getItems().find(i=>i.id===id)?.n||id;}
function openCart(){
  const ents=Object.entries(S.cart);if(!ents.length){showToast(T('emptyCart'),'warn');return;}
  document.getElementById('cart-items').innerHTML=ents.map(([key,ci])=>{
    const optsV=ci.opts&&Object.keys(ci.opts).length?Object.entries(ci.opts).map(([k,v])=>`${k}: ${v}`).join(' · '):'';
    return `<div class="ci">
      <div class="ci-top">
        <div class="ci-ctrl">
          <button class="ciq" onclick="cChange('${key}',-1)">−</button>
          <span style="min-width:18px;text-align:center;font-weight:700;font-size:.88rem">${ci.qty}</span>
          <button class="ciq plus" onclick="cChange('${key}',1)">+</button>
        </div>
        <div class="ci-name">${getItemName(ci.itemId)}</div>
        <div class="ci-price">${ci.price*ci.qty}${T('currency')}</div>
      </div>${optsV?`<div class="ci-opts">${optsV}</div>`:''}</div>`;
  }).join('');
  document.getElementById('cart-note').placeholder=T('noteHint');
  document.getElementById('cart-note').value='';
  document.getElementById('cart-total').textContent=cartAmt()+T('currency');
  document.getElementById('ctotal-lbl').textContent=T('total');
  document.getElementById('cs-title').textContent=`${T('cartTitle')} — ${T('tableN')}${S.tableId}`;
  document.getElementById('send-btn').textContent=T('sendKitchen');
  document.getElementById('cart-ovl').classList.add('open');
}
function closeCart(){document.getElementById('cart-ovl').classList.remove('open');}
function cChange(key,d){
  if(!S.cart[key])return;S.cart[key].qty+=d;
  if(S.cart[key].qty<=0)delete S.cart[key];
  updFab();if(!cartN()){closeCart();return;}openCart();
}
function sendOrder(){
  if(!cartN()){showToast(T('emptyCart'),'warn');return;}
  const np=S.nav[S.nav.length-1];const addTo=np?.params?.addingTo;
  const cItems=Object.values(S.cart).map(ci=>({id:ci.itemId,qty:ci.qty,price:ci.price,name:getItemName(ci.itemId),opts:ci.opts||{},optsRaw:ci.optsRaw||{}}));
  if(addTo){
    const ords=getOrders();const idx=ords.findIndex(o=>o.id===addTo);
    if(idx>=0){
      cItems.forEach(ni=>{const ex=ords[idx].items.find(oi=>oi.id===ni.id&&JSON.stringify(oi.optsRaw||{})==JSON.stringify(ni.optsRaw||{}));ex?ex.qty+=ni.qty:ords[idx].items.push(ni);});
      const nv=document.getElementById('cart-note').value.trim();
      if(nv)ords[idx].notes=(ords[idx].notes?ords[idx].notes+' | ':'')+nv;
      saveOrders(ords);closeCart();S.cart={};updFab();showToast(T('addedToOrder'));goBack();goBack();return;
    }
  }
  const order={id:newOid(),tableId:S.tableId,items:cItems,notes:document.getElementById('cart-note').value.trim(),status:'new',createdAt:Date.now(),itemsDone:{}};
  const ords=getOrders();ords.push(order);saveOrders(ords);
  closeCart();S.cart={};updFab();showToast(T('sent'));setTimeout(()=>goBack(),500);
}

/* ══════════════════════════════════════════
   KITCHEN
══════════════════════════════════════════ */
function renderKitchen(){
  setTitle(T('kitchen'),'');showBack(false);setRight(`${syncPill()}<button class="tb-icon-btn" onclick="showHome()">🏠</button>`);
  document.getElementById('main').innerHTML=`<div class="k-toolbar">
    <button class="chip ${S.kFilter==='active'?'on':''}" onclick="setKF('active')">🔥 Active</button>
    <button class="chip ${S.kFilter==='all'?'on':''}" onclick="setKF('all')">${T('all')}</button>
    <button class="chip ${S.kFilter==='ready'?'on':''}" onclick="setKF('ready')">✅ ${T('ready')}</button>
  </div><div id="kbody"></div>`;
  renderKitchenContent();
}
function setKF(f){S.kFilter=f;document.querySelectorAll('.k-toolbar .chip').forEach((b,i)=>b.classList.toggle('on',['active','all','ready'][i]===f));renderKitchenContent();}
function renderKitchenContent(){
  const ords=getOrders();const tbls=getTables();
  let list=ords.filter(o=>S.kFilter==='active'?['new','prep'].includes(o.status):S.kFilter==='ready'?o.status==='ready':['new','prep','ready'].includes(o.status)).sort((a,b)=>a.createdAt-b.createdAt);
  const el=document.getElementById('kbody');if(!el)return;
  if(!list.length){el.innerHTML=`<div class="empty"><div class="ei">✅</div><p>${T('noOrders')}</p></div>`;return;}
  el.innerHTML=list.map(o=>{
    const tbl=tbls.find(t=>t.id===o.tableId);
    const stCls={new:'new pulse',prep:'prep',ready:'ready'}[o.status]||'';
    const stTxt={new:T('newOrder'),prep:T('inProg'),ready:T('readyTxt')}[o.status]||'';
    const mins=Math.floor((Date.now()-o.createdAt)/60000);
    const ih=o.items.map(oi=>{
      const dk=oi.id+JSON.stringify(oi.optsRaw||{});
      const done=o.itemsDone&&o.itemsDone[dk];
      const optsV=oi.opts&&Object.keys(oi.opts).length?Object.values(oi.opts).join(' · '):'';
      return `<div class="koi ${done?'done':''}">
        <div class="koi-qty">${oi.qty}</div>
        <div class="koi-info"><div class="koi-name">${oi.name}</div>${optsV?`<div class="koi-opts">📌 ${optsV}</div>`:''}</div>
        <button class="item-chk ${done?'done':''}" onclick="togDone(${o.id},'${encodeURIComponent(dk)}')">${done?'✓':'✓?'}</button>
      </div>`;
    }).join('');
    return `<div class="kord ${o.status}">
      <div class="kord-h">
        <span class="kord-t">${tbl?tbl.name:T('tableN')+o.tableId} — #${o.id}</span>
        <div style="display:flex;gap:.3rem;align-items:center">
          <span class="k-min ${mins>=10&&o.status!=='ready'?'urg':''}">${mins}m</span>
          <span class="ks ${stCls}">${stTxt}</span>
        </div>
      </div>
      <div class="kord-items">${ih}</div>
      ${o.notes?`<div class="kord-note">${T('notes')} ${o.notes}</div>`:''}
      <div class="kord-foot">
        ${o.status!=='ready'?
          `<button class="k-btn k-green" onclick="setOSt(${o.id},'ready')">${T('readyBtn')}</button>
           ${o.status==='new'?`<button class="k-btn k-ora" onclick="setOSt(${o.id},'prep')">${T('startPrep')}</button>`:''}`
          :`<button class="k-btn k-grey" onclick="setOSt(${o.id},'prep')">${T('revert')}</button>`}
        <button class="k-cancel" onclick="canOrd(${o.id})">✕</button>
      </div></div>`;
  }).join('');
}
function togDone(oid,dk){
  const ords=getOrders();const i=ords.findIndex(o=>o.id===oid);
  if(i<0)return;if(!ords[i].itemsDone)ords[i].itemsDone={};
  ords[i].itemsDone[dk]=!ords[i].itemsDone[dk];saveOrders(ords);renderKitchenContent();
}
function setOSt(id,st){const ords=getOrders();const i=ords.findIndex(o=>o.id===id);if(i>=0){ords[i].status=st;saveOrders(ords);}renderKitchenContent();}
function canOrd(id){if(!confirm(T('confirmCancel')))return;const ords=getOrders();const i=ords.findIndex(o=>o.id===id);if(i>=0){ords[i].status='cancelled';saveOrders(ords);}showToast(T('cancelled'),'err');renderKitchenContent();}

/* ══════════════════════════════════════════
   CASHIER
══════════════════════════════════════════ */
function renderCashier(){
  setTitle(T('cashier'),'');showBack(false);setRight(`${syncPill()}<button class="tb-icon-btn" onclick="showHome()">🏠</button>`);
  document.getElementById('main').innerHTML='<div id="cbody"></div>';renderCashierContent();
}
function renderCashierContent(){
  const ords=getOrders().filter(o=>['new','prep','ready'].includes(o.status));
  const tbls=getTables();const el=document.getElementById('cbody');if(!el)return;
  if(!ords.length){el.innerHTML=`<div class="empty"><div class="ei">💰</div><p>${T('noOrders')}</p></div>`;return;}
  el.innerHTML=ords.map(o=>{
    const tbl=tbls.find(t=>t.id===o.tableId);
    const stTxt=T('orderStatus')[o.status]||o.status;
    const stC=o.status;
    return `<div class="bill">
      <div class="bill-h"><span style="font-size:.86rem;font-weight:700;color:var(--txt2)">${tbl?tbl.name:T('tableN')+o.tableId} — #${o.id}</span><span class="ks ${stC}">${stTxt}</span></div>
      <div class="bill-items">${o.items.map(oi=>{const ov=oi.opts&&Object.keys(oi.opts).length?Object.values(oi.opts).join(' · '):'';
        return `<div class="bill-item"><div class="bill-item-top"><span>${oi.qty}× ${oi.name}</span><span style="color:var(--gold);font-weight:700">${oi.price*oi.qty}${T('currency')}</span></div>${ov?`<div class="bill-item-opts">📌 ${ov}</div>`:''}</div>`;}).join('')}</div>
      ${o.notes?`<div class="ordr-note" style="margin:.3rem .7rem">${T('notes')} ${o.notes}</div>`:''}
      <div class="bill-foot"><span class="bill-total">${oTotal(o)}${T('currency')}</span><button class="pay-btn" onclick="openPay(${o.id})">${T('payBill')}</button></div>
    </div>`;
  }).join('');
}
function openPay(oid){
  S.payOid=oid;S.payM='cash';
  const o=getOrders().find(x=>x.id===oid);if(!o)return;
  const tbl=getTables().find(t=>t.id===o.tableId);
  showModal(`<h3>${T('payTitle')}</h3>
    <div style="text-align:center;margin-bottom:.9rem">
      <div style="font-size:.8rem;color:var(--muted)">${tbl?tbl.name:T('tableN')+oid} — #${oid}</div>
      <div style="font-size:1.9rem;font-weight:900;color:var(--gold);margin:.35rem 0">${oTotal(o)}${T('currency')}</div>
    </div>
    <div class="pm-grid">
      <div class="pm-btn sel" id="pm-cash" onclick="sPay('cash')"><span class="pm-ic">💵</span><span class="pm-lb">${T('cash')}</span></div>
      <div class="pm-btn" id="pm-card" onclick="sPay('card')"><span class="pm-ic">💳</span><span class="pm-lb">${T('card')}</span></div>
      <div class="pm-btn" id="pm-stc" onclick="sPay('stc')"><span class="pm-ic">📱</span><span class="pm-lb">${T('stc')}</span></div>
      <div class="pm-btn" id="pm-tamara" onclick="sPay('tamara')"><span class="pm-ic">🛍️</span><span class="pm-lb">${T('tamara')}</span></div>
    </div>
    <div class="ma"><button class="btn-s" onclick="closeModal()">${T('cancel')}</button><button class="btn-p" onclick="confPay()">${T('confirmPay')}</button></div>`);
}
function sPay(m){S.payM=m;document.querySelectorAll('.pm-btn').forEach(el=>el.classList.remove('sel'));document.getElementById(`pm-${m}`)?.classList.add('sel');}
function confPay(){
  const ords=getOrders();const i=ords.findIndex(o=>o.id===S.payOid);if(i<0)return;
  ords[i].status='paid';ords[i].paidAt=Date.now();ords[i].payMethod=S.payM;
  saveOrders(ords);closeModal();showReceipt(ords[i]);
}
function showReceipt(order){
  const tbl=getTables().find(t=>t.id===order.tableId);
  const pmL={cash:T('cash'),card:T('card'),stc:'STC Pay',tamara:T('tamara')}[order.payMethod]||order.payMethod;
  const s=getSettings();
  const ih=order.items.map(oi=>{const ov=oi.opts&&Object.keys(oi.opts).length?Object.values(oi.opts).join(' · '):'';
    return `<div class="rl"><div class="rl-top"><span>${oi.qty}× ${oi.name}</span><span>${oi.price*oi.qty}${T('currency')}</span></div>${ov?`<div class="rl-opts">📌 ${ov}</div>`:''}</div>`;}).join('');
  showModal(`<h3>${T('receipt')}</h3>
    <div class="receipt">
      <h4>${s.name||'شاهي قمرا'}</h4>
      <div class="rdate">${new Date().toLocaleDateString()} ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="rl"><div class="rl-top" style="font-weight:700"><span>${T('table')}</span><span>${tbl?tbl.name:T('tableN')+order.tableId}</span></div></div>
      ${ih}
      <div class="rt"><span>${T('total')}</span><span>${oTotal(order)}${T('currency')}</span></div>
      <div class="rl"><div class="rl-top" style="margin-top:.3rem"><span>${T('payMethod')}</span><span>${pmL}</span></div></div>
      <div class="rthanks">${T('thankYou')}</div>
    </div>
    <button class="print-btn" onclick="window.print()">${T('print')}</button>
    <div class="ma" style="margin-top:.5rem"><button class="btn-p" onclick="closeModal();if(S.screen==='cashier')renderCashierContent()">${T('close')}</button></div>`);
  showToast(T('paid'));
}

/* ══════════════════════════════════════════
   ADMIN
══════════════════════════════════════════ */
function renderAdmin(){
  setTitle(T('admin'),'');showBack(false);setRight(`${syncPill()}<button class="tb-icon-btn" onclick="showHome()">🏠</button>`);
  const tabs=[{id:'dash',k:'dash'},{id:'menu',k:'menuTab'},{id:'tables',k:'tablesTab'},{id:'orders',k:'ordersTab'},{id:'settings',k:'settingsTab'}];
  const th=`<div class="atabs">${tabs.map(t=>`<button class="atab ${S.adminTab===t.id?'on':''}" onclick="setAT('${t.id}')">${T(t.k)}</button>`).join('')}</div>`;
  let c='';
  if(S.adminTab==='dash')c=aDash();else if(S.adminTab==='menu')c=aMenu();
  else if(S.adminTab==='tables')c=aTables();else if(S.adminTab==='orders')c=aOrders();
  else c=aSettings();
  document.getElementById('main').innerHTML=th+c;
}
function setAT(t){S.adminTab=t;renderAdmin();}
function aDash(){
  const ords=getOrders();const today=new Date();today.setHours(0,0,0,0);
  const tO=ords.filter(o=>o.createdAt>=today.getTime());
  const tP=tO.filter(o=>o.status==='paid');const rev=tP.reduce((s,o)=>s+oTotal(o),0);
  const act=ords.filter(o=>['new','prep','ready'].includes(o.status));
  const tbls=getTables().filter(t=>t.active);const occ=tbls.filter(t=>tblStatus(t.id)!=='free');
  const rec=ords.filter(o=>o.status==='paid').slice(-5).reverse();
  return `<div class="stats-grid">
    <div class="scard"><div class="snum">${rev}</div><div class="slbl">${T('todayRev')}</div></div>
    <div class="scard"><div class="snum">${tP.length}</div><div class="slbl">${T('paidOrders')}</div></div>
    <div class="scard"><div class="snum">${act.length}</div><div class="slbl">${T('activeOrders')}</div></div>
    <div class="scard"><div class="snum">${occ.length}/${tbls.length}</div><div class="slbl">${T('occupiedTables')}</div></div>
  </div>
  <div class="sec-hd"><span class="sec-ttl">${T('recentPaid')}</span></div>
  ${rec.length?rec.map(o=>{const t=getTables().find(x=>x.id===o.tableId);
    return `<div class="arow"><div class="ar-ph">🧾</div><div class="ar-info"><div class="ar-name">${t?t.name:T('tableN')+o.tableId} — #${o.id}</div><div class="ar-cat">${tAgo(o.paidAt||o.createdAt)}</div></div><div style="font-weight:800;color:var(--gold)">${oTotal(o)}${T('currency')}</div></div>`;
  }).join(''):`<div class="empty" style="padding:1rem"><p>${T('noPayments')}</p></div>`}`;
}
function aMenu(){
  const items=getItems();const cats=CATS;
  const fH=`<div style="display:flex;gap:.38rem;overflow-x:auto;padding-bottom:.38rem;margin-bottom:.65rem;scrollbar-width:none">
    <button class="chip ${S.adminCat==='all'?'on':''}" onclick="setAC('all')">${T('all')}</button>
    ${cats.map(c=>`<button class="chip ${S.adminCat===c.id?'on':''}" onclick="setAC('${c.id}')">${c.e} ${catLabel(c)}</button>`).join('')}</div>`;
  const fil=S.adminCat==='all'?items:items.filter(i=>i.c===S.adminCat);
  return `<div class="sec-hd"><span class="sec-ttl">${T('manageMenu')} (${items.length})</span><button class="btn-add" onclick="addItem()">+ ${T('addItem').replace('+ ','')}</button></div>
    ${fH}${fil.map(item=>`<div class="arow">
      ${item.img?`<img src="${item.img}" loading="lazy">`:` <div class="ar-ph">🍽️</div>`}
      <div class="ar-info"><div class="ar-name">${item.n}</div><div class="ar-price">${item.p}${T('currency')}</div>
      <div class="ar-cat">${catLabel(CATS.find(c=>c.id===item.c)||{n:item.c})}${item.available===false?' · <span style="color:var(--red)">✕</span>':''}</div></div>
      <div style="display:flex;gap:.28rem;flex-direction:column">
        <button class="ebtn" onclick="editItem('${item.id}')">✏️</button>
        <button class="tbtn" onclick="togAvail('${item.id}')">${item.available===false?'✅':'⛔'}</button>
        <button class="dbtn" onclick="delItem('${item.id}')">🗑️</button>
      </div></div>`).join('')||`<div class="empty" style="padding:1rem"><p>${T('noItems')}</p></div>`}`;
}
function setAC(c){S.adminCat=c;renderAdmin();}
function togAvail(id){const its=getItems();const i=its.findIndex(x=>x.id===id);if(i>=0){its[i].available=its[i].available===false;saveItems(its);}renderAdmin();}
function delItem(id){if(!confirm(T('confirmDelete')))return;saveItems(getItems().filter(i=>i.id!==id));showToast(T('deleted'),'warn');renderAdmin();}
function editItem(id){
  const item=getItems().find(i=>i.id===id);if(!item)return;
  showModal(`<h3>${T('editItem')}</h3>
    <div class="ff"><label>${T('itemName')}</label><input class="fi" id="ei-n" value="${item.n}"></div>
    <div class="ff"><label>${T('price')}</label><input class="fi" type="number" id="ei-p" value="${item.p}"></div>
    <div class="ff"><label>${T('category')}</label><select class="fi" id="ei-c">${CATS.map(c=>`<option value="${c.id}" ${item.c===c.id?'selected':''}>${c.e} ${catLabel(c)}</option>`).join('')}</select></div>
    <div class="ff"><label>${T('imgUrl')}</label><input class="fi" id="ei-img" value="${item.img||''}"></div>
    <div class="ma"><button class="btn-s" onclick="closeModal()">${T('cancel')}</button><button class="btn-p" onclick="svEdit('${id}')">${T('save')}</button></div>`);
}
function svEdit(id){
  const its=getItems();const i=its.findIndex(x=>x.id===id);if(i<0)return;
  its[i].n=document.getElementById('ei-n').value.trim()||its[i].n;
  its[i].p=parseFloat(document.getElementById('ei-p').value)||its[i].p;
  its[i].c=document.getElementById('ei-c').value;its[i].img=document.getElementById('ei-img').value.trim();
  saveItems(its);closeModal();showToast(T('saved'));renderAdmin();
}
function addItem(){
  showModal(`<h3>${T('newItem')}</h3>
    <div class="ff"><label>${T('itemName')}</label><input class="fi" id="ni-n" placeholder="..."></div>
    <div class="ff"><label>${T('price')}</label><input class="fi" type="number" id="ni-p" placeholder="0"></div>
    <div class="ff"><label>${T('category')}</label><select class="fi" id="ni-c">${CATS.map(c=>`<option value="${c.id}">${c.e} ${catLabel(c)}</option>`).join('')}</select></div>
    <div class="ff"><label>${T('imgUrl')}</label><input class="fi" id="ni-img" placeholder="https://..."></div>
    <div class="ma"><button class="btn-s" onclick="closeModal()">${T('cancel')}</button><button class="btn-p" onclick="svNew()">✅ ${T('add')}</button></div>`);
}
function svNew(){
  const n=document.getElementById('ni-n').value.trim();const p=parseFloat(document.getElementById('ni-p').value);
  if(!n||isNaN(p)){showToast(T('required'),'warn');return;}
  const its=getItems();
  its.push({id:'ci'+Date.now(),n,p,c:document.getElementById('ni-c').value,img:document.getElementById('ni-img').value.trim(),available:true});
  saveItems(its);closeModal();showToast(T('added'));renderAdmin();
}
function aTables(){
  const tbls=getTables();
  return `<div class="sec-hd"><span class="sec-ttl">${T('manageTables')} (${tbls.length})</span><button class="btn-add" onclick="addTbl()">+</button></div>
    ${tbls.map(t=>`<div class="arow">
      <div style="font-size:1.2rem;font-weight:900;color:var(--gold);min-width:1.8rem">${t.id}</div>
      <input class="fi" style="flex:1;padding:.36rem .68rem" value="${t.name}" id="tn-${t.id}" onchange="svTbl(${t.id})">
      <button class="tbtn" onclick="togTbl(${t.id})" style="color:${t.active?'var(--grn)':'var(--red)'}">${t.active?'✅':'⛔'}</button>
      <button class="dbtn" onclick="rmTbl(${t.id})">🗑️</button></div>`).join('')}`;
}
function svTbl(id){const t=getTables();const i=t.findIndex(x=>x.id===id);if(i>=0){t[i].name=document.getElementById(`tn-${id}`).value.trim()||t[i].name;saveTables(t);}}
function togTbl(id){const t=getTables();const i=t.findIndex(x=>x.id===id);if(i>=0){t[i].active=!t[i].active;saveTables(t);}renderAdmin();}
function addTbl(){const t=getTables();const nid=Math.max(...t.map(x=>x.id),0)+1;t.push({id:nid,name:`طاولة ${nid}`,active:true});saveTables(t);showToast('✅ '+nid);renderAdmin();}
function rmTbl(id){if(!confirm(T('confirmDeleteTable')))return;saveTables(getTables().filter(t=>t.id!==id));renderAdmin();}
function aOrders(){
  const ords=getOrders();
  const fOpts=[{id:'all',k:'all'},{id:'active',k:'busy'},{id:'paid',k:'ready'},{id:'cancelled',k:'cancelled'}];
  const fk=S.kFilter||'all';
  const list=ords.filter(o=>{if(fk==='active')return['new','prep','ready'].includes(o.status);if(fk==='paid')return o.status==='paid';if(fk==='cancelled')return o.status==='cancelled';return true;}).reverse();
  return `<div class="sec-hd"><span class="sec-ttl">${T('allOrders')} (${list.length})</span></div>
    <div style="display:flex;gap:.38rem;margin-bottom:.8rem;overflow-x:auto">
      <button class="chip ${fk==='all'?'on':''}" onclick="setKF('all');setAT('orders')">${T('all')}</button>
      <button class="chip ${fk==='active'?'on':''}" onclick="setKF('active');setAT('orders')">Active</button>
      <button class="chip ${fk==='paid'?'on':''}" onclick="setKF('paid');setAT('orders')">Paid</button>
      <button class="chip ${fk==='cancelled'?'on':''}" onclick="setKF('cancelled');setAT('orders')">Cancelled</button>
    </div>
    ${list.map(o=>{const tbl=getTables().find(t=>t.id===o.tableId);const stC=o.status;const stT=T('orderStatus')[o.status]||o.status;
      return `<div class="arow" style="align-items:flex-start"><div class="ar-ph">🧾</div>
        <div class="ar-info"><div class="ar-name">${tbl?tbl.name:T('tableN')+o.tableId} — #${o.id}</div>
        <div class="ar-cat">${tAgo(o.createdAt)}</div>
        <div style="font-size:.68rem;color:var(--muted);margin-top:.18rem">${o.items.map(x=>x.qty+'× '+x.name).join(', ')}</div></div>
        <div style="text-align:right;flex-shrink:0"><div style="font-weight:800;color:var(--gold)">${oTotal(o)}${T('currency')}</div>
        <span class="ks ${stC}" style="margin-top:.2rem;display:inline-block">${stT}</span>
        ${['new','prep','ready'].includes(o.status)?`<div style="margin-top:.25rem"><button class="pay-btn" style="font-size:.7rem;padding:.16rem .42rem" onclick="openPay(${o.id})">${T('pay')}</button></div>`:''}</div></div>`;
    }).join('')||`<div class="empty" style="padding:1rem"><p>${T('noOrders')}</p></div>`}`;
}
function aSettings(){
  const s=getSettings();
  return `<div class="sec-hd"><span class="sec-ttl">${T('settingsTab')}</span></div>
    <div class="ff"><label>${T('cafeName')}</label><input class="fi" id="st-name" value="${s.name||'شاهي قمرا'}"></div>
    <div class="ff"><label>${T('pinCode')}</label><input class="fi" type="number" id="st-pin" value="${s.pin||'9999'}"></div>
    <div style="background:var(--ora-bg);border:1px solid rgba(196,123,8,.2);border-radius:8px;padding:.6rem;font-size:.71rem;color:var(--ora);margin:.45rem 0">${T('fbWarning')}</div>
    <button class="btn-p" style="width:100%;margin:.7rem 0" onclick="svSettings()">${T('saveSettings')}</button>
    <div class="sep"></div>
    <div class="sec-hd" style="margin-top:.7rem"><span class="sec-ttl" style="color:var(--red)">${T('dangerZone')}</span></div>
    <button class="btn-d" style="width:100%;margin-bottom:.45rem" onclick="clrOrds()">${T('clearOrders')}</button>
    <button style="width:100%;background:none;border:1.5px solid var(--red);color:var(--red);border-radius:8px;padding:.58rem;font-size:.82rem;cursor:pointer" onclick="rstMenu()">${T('resetMenu')}</button>`;
}
function svSettings(){const s=getSettings();s.name=document.getElementById('st-name').value.trim()||'شاهي قمرا';const p=document.getElementById('st-pin').value.trim();if(p.length>=4)s.pin=p;saveSettings(s);showToast(T('saved'));}
function clrOrds(){if(!confirm(T('confirmClearOrders')))return;saveOrders([]);showToast(T('deleted'),'err');renderAdmin();}
function rstMenu(){if(!confirm(T('confirmResetMenu')))return;saveItems(DEFAULT_ITEMS);showToast(T('saved'));renderAdmin();}

/* ══════════════════════════════════════════
   MODAL / TOAST
══════════════════════════════════════════ */
function showModal(h){document.getElementById('modal-box').innerHTML=h;document.getElementById('modal-ovl').classList.add('open');}
function closeModal(){document.getElementById('modal-ovl').classList.remove('open');}
let toastT;
function showToast(m,t='ok'){const el=document.getElementById('toast');el.textContent=m;el.className=`toast show${t==='err'?' err':t==='warn'?' warn':''}`;clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}
function tAgo(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return lang==='ar'?'الآن':'now';if(m<60)return`${m}${lang==='ar'?'د':'m'}`;return`${Math.floor(m/60)}${lang==='ar'?'س':'h'}`;}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
// Restore lang
const savedLang=LS.get('qamra_lang','ar');
if(savedLang!=='ar')setLang(savedLang);
// Firebase init
initFb();
// SW
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
// Storage cross-tab
window.addEventListener('storage',e=>{
  if(e.key==='qamra_orders'){
    if(S.screen==='kitchen')renderKitchenContent();
    else if(S.screen==='cashier')renderCashierContent();
  }
});
</script>
</body>

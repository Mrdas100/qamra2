<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#8B5E1A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="شاهي قمرا">
<title>شاهي قمرا — نظام الطلبات</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════ LIGHT THEME ═══════════════ */
:root{
  --bg:#F5EFE4;
  --sur:#FFFFFF;
  --card:#FDFAF5;
  --brd:#DDD0B8;
  --gold:#7A5018;
  --glo:#8B5E1A;
  --warm:#A06A22;
  --txt:#1E1008;
  --txt2:#4A2E10;
  --muted:#9B7B5A;
  --grn:#1A6E3C;
  --grn-bg:#E8F5EE;
  --red:#B03020;
  --red-bg:#FDECEA;
  --ora:#C47B08;
  --ora-bg:#FEF5E0;
  --blu:#1255A0;
  --blu-bg:#E8F0FB;
  --r:12px;
  --sh:0 2px 12px rgba(139,94,26,.10);
  --sh2:0 4px 20px rgba(139,94,26,.16);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* ─── HOME ─── */
#home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;
  background:linear-gradient(160deg,#FFF8EE 0%,#F0E5D0 100%)}
.logo{text-align:center;margin-bottom:2.5rem}
.logo .li{font-size:4.5rem;line-height:1;filter:drop-shadow(0 4px 8px rgba(139,94,26,.2))}
.logo h1{font-size:2.2rem;font-weight:900;color:var(--gold);margin-top:.4rem;letter-spacing:-.02em}
.logo p{color:var(--muted);font-size:.82rem;margin-top:.2rem}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;width:100%;max-width:380px}
.role-btn{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);padding:1.3rem 1rem;
  cursor:pointer;text-align:center;transition:all .18s;color:var(--txt);box-shadow:var(--sh)}
.role-btn:active{transform:scale(.96);box-shadow:none}
.role-btn .ri{font-size:2rem;display:block;margin-bottom:.35rem}
.role-btn .rn{font-size:.95rem;font-weight:700;display:block;color:var(--txt2)}
.role-btn .rd{font-size:.68rem;color:var(--muted);display:block;margin-top:.15rem}
.role-btn.gold-role{border-color:var(--gold);background:linear-gradient(135deg,#FFF8EC,#FFF0D8)}
.role-btn.full-width{grid-column:1/-1}
/* firebase status dot */
.fb-status{display:flex;align-items:center;justify-content:center;gap:.4rem;margin-top:1.5rem;font-size:.72rem;color:var(--muted)}
.fb-dot{width:8px;height:8px;border-radius:50%;background:var(--brd);flex-shrink:0}
.fb-dot.on{background:var(--grn)}
.fb-dot.err{background:var(--red)}

/* ─── PIN ─── */
#pin{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:2rem;background:var(--bg)}
.pin-title{font-size:1.05rem;font-weight:700;color:var(--gold);margin-bottom:1rem}
.pin-disp{font-size:2.5rem;letter-spacing:.7rem;color:var(--gold);min-height:3rem;display:flex;align-items:center;margin:.5rem 0 1.5rem}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.65rem;width:100%;max-width:260px}
.pk{background:var(--sur);border:1px solid var(--brd);border-radius:12px;padding:.9rem;font-size:1.5rem;
  font-weight:700;text-align:center;cursor:pointer;color:var(--txt);transition:all .13s;box-shadow:var(--sh)}
.pk:active{background:var(--gold);color:#fff;transform:scale(.93);box-shadow:none}
.pk.del{color:var(--red)}
.pk.empty{visibility:hidden;pointer-events:none}
.pin-err{color:var(--red);font-size:.83rem;margin-top:.7rem;height:1.2rem;font-weight:600}
.pin-back{background:none;border:none;color:var(--muted);font-size:.82rem;cursor:pointer;margin-top:1.5rem;text-decoration:underline}

/* ─── APP SHELL ─── */
#app{display:none;flex-direction:column;height:100dvh;height:100vh}
.topbar{background:var(--sur);border-bottom:2px solid var(--brd);padding:.65rem 1rem;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  min-height:54px;box-shadow:0 2px 8px rgba(139,94,26,.08)}
.topbar-l{display:flex;align-items:center;gap:.4rem}
.topbar-r{display:flex;align-items:center;gap:.4rem}
.tb-back{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;
  padding:.2rem .5rem;line-height:1;transition:color .15s}
.tb-back:active{color:var(--gold)}
.tb-title{font-size:1rem;font-weight:800;color:var(--gold)}
.tb-sub{font-size:.7rem;color:var(--muted)}
.tb-icon-btn{background:var(--card);border:1px solid var(--brd);border-radius:8px;
  color:var(--txt2);width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.95rem;position:relative;box-shadow:var(--sh)}
.notif-dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;background:var(--red);
  border-radius:50%;border:2px solid var(--sur)}
#main{flex:1;overflow-y:auto;padding:1rem;-webkit-overflow-scrolling:touch}

/* ─── TABLES ─── */
.tables-header{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1rem}
.filter-chip{background:var(--sur);border:1.5px solid var(--brd);border-radius:20px;
  padding:.28rem .8rem;font-size:.74rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .15s}
.filter-chip.on{background:var(--gold);border-color:var(--gold);color:#fff}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:.7rem}
.tc{background:var(--sur);border:2px solid var(--brd);border-radius:var(--r);
  padding:1rem .5rem;text-align:center;cursor:pointer;transition:all .18s;
  position:relative;box-shadow:var(--sh)}
.tc:active{transform:scale(.95);box-shadow:none}
.tc.occ{border-color:var(--ora);background:var(--ora-bg)}
.tc.ready{border-color:var(--grn);background:var(--grn-bg)}
.tc.pay{border-color:var(--blu);background:var(--blu-bg)}
.tc .tnum{font-size:1.5rem;font-weight:900;color:var(--gold)}
.tc .tname{font-size:.62rem;color:var(--muted);margin-top:.12rem}
.tc .tstat{font-size:.6rem;margin-top:.25rem;font-weight:700}
.tc.occ .tstat{color:var(--ora)}
.tc.ready .tstat{color:var(--grn)}
.tc.pay .tstat{color:var(--blu)}
.tc .tdot{width:7px;height:7px;border-radius:50%;background:var(--brd);margin:.35rem auto 0}
.tc.occ .tdot{background:var(--ora)}
.tc.ready .tdot{background:var(--grn)}
.tc.pay .tdot{background:var(--blu)}
.tc .tamt{font-size:.62rem;color:var(--muted);margin-top:.15rem}

/* ─── MENU ─── */
.cats{display:flex;gap:.45rem;overflow-x:auto;padding-bottom:.5rem;margin-bottom:.85rem;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-b{white-space:nowrap;background:var(--sur);border:1.5px solid var(--brd);border-radius:20px;
  padding:.3rem .9rem;color:var(--muted);font-size:.78rem;font-weight:700;cursor:pointer;
  transition:all .15s;flex-shrink:0}
.cat-b.on{background:var(--gold);border-color:var(--gold);color:#fff}
.mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:.7rem}
.mi{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:all .15s;position:relative;box-shadow:var(--sh)}
.mi:active{transform:scale(.97)}
.mi.in-cart{border-color:var(--gold)}
.mi img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.mi-img-ph{width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.mi-body{padding:.5rem .65rem}
.mi-name{font-size:.78rem;font-weight:600;color:var(--txt2);line-height:1.3;min-height:2.1rem}
.mi-price{font-size:.82rem;font-weight:700;color:var(--gold);margin-top:.2rem}
.mi-has-opts{font-size:.62rem;color:var(--muted);margin-top:.1rem}
.mi-ctrl{display:flex;align-items:center;justify-content:space-between;
  padding:.4rem .65rem;border-top:1px solid var(--brd);background:var(--card)}
.qbtn{background:var(--brd);border:none;color:var(--txt);width:30px;height:30px;border-radius:50%;
  font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .13s;flex-shrink:0}
.qbtn:active{background:var(--gold);color:#fff}
.qbtn.add-btn{background:var(--gold);color:#fff}
.qnum{font-weight:700;font-size:.92rem;min-width:22px;text-align:center;color:var(--txt2)}
.search-box{width:100%;background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  padding:.6rem 1rem;color:var(--txt);font-size:.9rem;margin-bottom:.85rem;box-shadow:var(--sh)}
.search-box::placeholder{color:var(--muted)}
.search-box:focus{outline:none;border-color:var(--gold)}

/* ─── OPTIONS BOTTOM SHEET ─── */
.opts-ovl{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:400;display:none;align-items:flex-end}
.opts-ovl.open{display:flex}
.opts-sheet{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-height:88vh;
  overflow-y:auto;animation:sup .25s ease}
.os-head{padding:1.2rem 1.2rem .75rem;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--sur);z-index:1}
.os-item-info{display:flex;gap:.85rem;align-items:center}
.os-img{width:60px;height:60px;border-radius:10px;object-fit:cover;flex-shrink:0}
.os-img-ph{width:60px;height:60px;border-radius:10px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0}
.os-item-name{font-size:1rem;font-weight:800;color:var(--txt);line-height:1.25}
.os-item-price{font-size:.95rem;font-weight:700;color:var(--gold);margin-top:.2rem}
.opts-body{padding:.85rem 1.1rem 1rem}
.opt-group{margin-bottom:1rem}
.og-label{font-size:.78rem;font-weight:700;color:var(--txt2);margin-bottom:.5rem;
  display:flex;align-items:center;gap:.4rem}
.og-req{font-size:.65rem;background:var(--red-bg);color:var(--red);
  padding:.1rem .4rem;border-radius:20px;font-weight:600}
.og-opt{font-size:.65rem;background:var(--ora-bg);color:var(--ora);
  padding:.1rem .4rem;border-radius:20px;font-weight:600}
.choices-row{display:flex;flex-wrap:wrap;gap:.45rem}
.oc{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;
  padding:.35rem .85rem;font-size:.8rem;font-weight:600;cursor:pointer;
  color:var(--txt2);transition:all .15s}
.oc:active{transform:scale(.95)}
.oc.sel{background:var(--gold);border-color:var(--gold);color:#fff}
.oc .oc-diff{font-size:.68rem;font-weight:400}
.qty-row{display:flex;align-items:center;gap:.75rem;margin-top:.3rem}
.qty-lbl{font-size:.82rem;color:var(--muted);flex:1}
.qty-ctrl{display:flex;align-items:center;gap:.5rem}
.qs-btn{background:var(--brd);border:none;color:var(--txt);width:32px;height:32px;
  border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qs-btn:active{background:var(--gold);color:#fff}
.qs-num{font-size:1rem;font-weight:700;min-width:22px;text-align:center}
.os-foot{padding:.85rem 1.1rem 1.2rem;border-top:1px solid var(--brd);display:flex;gap:.65rem;position:sticky;bottom:0;background:var(--sur)}
.os-cancel{background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);
  padding:.7rem 1.2rem;font-size:.88rem;font-weight:700;cursor:pointer;color:var(--muted)}
.os-add{flex:1;background:var(--gold);color:#fff;border:none;border-radius:var(--r);
  padding:.7rem;font-size:.92rem;font-weight:800;cursor:pointer;transition:background .15s}
.os-add:active{background:var(--txt2)}

/* ─── ORDER DETAIL ─── */
.order-detail-card{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  overflow:hidden;margin-bottom:1rem;box-shadow:var(--sh)}
.odc-head{background:var(--bg);padding:.7rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.odc-head h3{font-size:.9rem;font-weight:700;color:var(--txt2)}
.odc-items{padding:.4rem 0}
.odc-item{padding:.45rem 1rem;border-bottom:1px solid var(--brd);display:flex;align-items:flex-start;gap:.6rem}
.odc-item:last-child{border-bottom:none}
.odc-qty{background:var(--gold);color:#fff;width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.odc-info{flex:1}
.odc-name{font-size:.82rem;font-weight:600;color:var(--txt2)}
.odc-opts-txt{font-size:.7rem;color:var(--muted);margin-top:.12rem}
.odc-price{font-size:.8rem;font-weight:700;color:var(--gold)}
.odc-foot{padding:.7rem 1rem;border-top:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.odc-total{font-size:1rem;font-weight:800;color:var(--gold)}
.odc-actions{display:flex;gap:.5rem;padding:.7rem 1rem}

/* ─── CART FAB ─── */
.cart-fab{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);
  background:var(--gold);color:#fff;border:none;border-radius:50px;
  padding:.8rem 1.7rem;font-size:.9rem;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(122,80,24,.4);display:flex;align-items:center;gap:.5rem;
  z-index:200;transition:all .2s;white-space:nowrap}
.cart-fab:active{transform:translateX(-50%) scale(.96)}

/* ─── CART SHEET ─── */
.cart-ovl{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:none;align-items:flex-end}
.cart-ovl.open{display:flex}
.cart-sheet{background:var(--sur);border-radius:20px 20px 0 0;width:100%;
  max-height:84vh;overflow-y:auto;padding:1.4rem;animation:sup .26s ease}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.cs-head{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:.9rem;padding-bottom:.7rem;border-bottom:1.5px solid var(--brd)}
.cs-head h3{font-size:.95rem;font-weight:800;color:var(--txt2)}
.xbtn{background:var(--bg);border:1px solid var(--brd);color:var(--muted);
  width:30px;height:30px;border-radius:50%;font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.ci{padding:.55rem 0;border-bottom:1px solid var(--brd)}
.ci-top{display:flex;align-items:center;gap:.6rem}
.ci-ctrl{display:flex;align-items:center;gap:.3rem}
.ciq{background:var(--brd);border:none;color:var(--txt);width:26px;height:26px;
  border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ciq.plus{background:var(--gold);color:#fff}
.ci-name{flex:1;font-size:.85rem;font-weight:600;color:var(--txt2)}
.ci-price{color:var(--gold);font-size:.82rem;font-weight:700}
.ci-opts{font-size:.7rem;color:var(--muted);margin:.1rem 0 0 62px;line-height:1.4}
textarea.note{width:100%;background:var(--card);border:1.5px solid var(--brd);border-radius:var(--r);
  padding:.6rem .9rem;color:var(--txt);font-size:.85rem;margin:.85rem 0 .5rem;resize:none;height:66px}
textarea.note::placeholder{color:var(--muted)}
textarea.note:focus{outline:none;border-color:var(--gold)}
.ctotal{display:flex;justify-content:space-between;align-items:center;
  padding:.55rem 0;font-weight:700;font-size:.95rem;border-bottom:1.5px solid var(--brd);margin-bottom:.7rem}
.ctotal-amt{color:var(--gold);font-size:1.2rem;font-weight:900}
.send-btn{width:100%;background:var(--grn);color:#fff;border:none;border-radius:var(--r);
  padding:.85rem;font-size:.92rem;font-weight:800;cursor:pointer;transition:all .18s}
.send-btn:active{transform:scale(.98)}
.send-btn:disabled{background:var(--brd);color:var(--muted)}

/* ─── KITCHEN ─── */
.k-toolbar{display:flex;gap:.45rem;margin-bottom:.9rem;flex-wrap:wrap;align-items:center}
.kord{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  overflow:hidden;margin-bottom:.85rem;box-shadow:var(--sh)}
.kord.new{border-color:var(--red);border-width:2px}
.kord.prep{border-color:var(--ora);border-width:2px}
.kord.ready{border-color:var(--grn)}
.kord-head{background:var(--bg);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.kord-title{font-size:.88rem;font-weight:700;color:var(--txt2)}
.kord-time{font-size:.68rem;color:var(--muted)}
.kord-items{padding:.4rem 0}
.koi{display:flex;align-items:flex-start;gap:.55rem;padding:.42rem 1rem;border-bottom:1px solid var(--brd)}
.koi:last-child{border-bottom:none}
.koi-qty{background:var(--gold);color:#fff;width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:1px}
.koi-info{flex:1}
.koi-name{font-size:.82rem;font-weight:600;color:var(--txt2)}
.koi-opts{font-size:.68rem;color:var(--muted);margin-top:.1rem;line-height:1.4}
.koi.done .koi-name{text-decoration:line-through;color:var(--muted)}
.koi.done .koi-qty{background:var(--grn)}
.item-chk{background:var(--sur);border:1.5px solid var(--brd);color:var(--muted);
  border-radius:6px;padding:.2rem .5rem;font-size:.68rem;cursor:pointer;transition:all .15s;margin-top:1px;flex-shrink:0}
.item-chk.done{background:var(--grn);border-color:var(--grn);color:#fff}
.kord-foot{padding:.6rem 1rem;display:flex;gap:.5rem;background:var(--bg);border-top:1px solid var(--brd)}
.k-btn{flex:1;border:none;border-radius:8px;padding:.55rem;font-size:.82rem;font-weight:700;cursor:pointer}
.k-ready-btn{background:var(--grn);color:#fff}
.k-prep-btn{background:var(--ora);color:#fff}
.k-cancel-btn{background:none;border:1.5px solid var(--red);color:var(--red);border-radius:8px;
  padding:.55rem .8rem;font-size:.82rem;font-weight:700;cursor:pointer}
.kord-note{background:var(--ora-bg);border-top:1px solid var(--brd);
  padding:.45rem 1rem;font-size:.74rem;color:var(--ora)}
.kstatus{display:inline-block;padding:.15rem .5rem;border-radius:20px;font-size:.67rem;font-weight:700}
.ks-new{background:var(--red-bg);color:var(--red)}
.ks-prep{background:var(--ora-bg);color:var(--ora)}
.ks-ready{background:var(--grn-bg);color:var(--grn)}
.ks-paid{background:var(--blu-bg);color:var(--blu)}
.pulse{animation:pls 1.1s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.3}}
.k-elapsed{display:inline-block;padding:.13rem .45rem;border-radius:20px;font-size:.67rem;font-weight:700;background:var(--bg);color:var(--muted)}
.k-elapsed.urgent{background:var(--red-bg);color:var(--red)}

/* ─── CASHIER ─── */
.bill-card{background:var(--sur);border:1.5px solid var(--brd);border-radius:var(--r);
  overflow:hidden;margin-bottom:.85rem;box-shadow:var(--sh)}
.bc-head{background:var(--bg);padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd)}
.bc-title{font-size:.88rem;font-weight:700;color:var(--txt2)}
.bc-items{padding:.4rem 1rem}
.bc-item{display:flex;flex-direction:column;padding:.3rem 0;border-bottom:1px solid var(--brd)}
.bc-item:last-child{border-bottom:none}
.bc-item-top{display:flex;justify-content:space-between;font-size:.82rem}
.bc-item-opts{font-size:.68rem;color:var(--muted);margin-top:.1rem}
.bc-foot{padding:.6rem 1rem;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--brd);background:var(--bg)}
.bc-total{font-size:1rem;font-weight:800;color:var(--gold)}
.pay-btn{background:var(--gold);color:#fff;border:none;border-radius:8px;padding:.4rem 1.1rem;font-size:.82rem;font-weight:700;cursor:pointer}
.pm-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.85rem 0}
.pm-btn{background:var(--card);border:2px solid var(--brd);border-radius:var(--r);
  padding:.9rem;text-align:center;cursor:pointer;transition:all .18s}

const FB_URL = 'https://nadelapp-9ec65-default-rtdb.firebaseio.com';
let fbOnline = false;

async function fbGet(path) {
  const r = await fetch(`${FB_URL}/${path}.json`);
  if (!r.ok) throw new Error('fb_get_failed');
  return r.json();
}
async function fbPut(path, data) {
  const r = await fetch(`${FB_URL}/${path}.json`, {
    method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error('fb_put_failed');
  return r.json();
}
async function checkFbConnection() {
  try {
    await fbGet('.info/connected');
    fbOnline = true;
  } catch { fbOnline = false; }
  updateSyncIndicator();
}
function updateSyncIndicator(syncing=false) {
  const dot = document.getElementById('sync-dot');
  const hdot = document.getElementById('fb-dot-home');
  const stxt = document.getElementById('fb-status-txt');
  if (!dot) return;
  if (syncing) { dot.className='sync-dot sync'; return; }
  if (fbOnline) {
    dot.className='sync-dot';dot.style.background='var(--grn)';
    if(hdot){hdot.className='fb-dot on';}
    if(stxt)stxt.textContent='متصل بالمزامنة ✓';

    dot.className='sync-dot err';

/* ════════════════════════════════════════════════════════
   STORAGE (local + Firebase)
════════════════════════════════════════════════════════ */
const LS={
  get:(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}},
  set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),
};

function getItems(){return LS.get('qamra_items',DEFAULT_ITEMS);}
function saveItems(v){LS.set('qamra_items',v);}
function getTables(){
  const def=Array.from({length:15},(_,i)=>({id:i+1,name:`طاولة ${i+1}`,active:true}));
  return LS.get('qamra_tables',def);
}
function saveTables(v){LS.set('qamra_tables',v);}
function getOrders(){return LS.get('qamra_orders',[]);}
function saveOrders(v){
  LS.set('qamra_orders',v);
  // Async Firebase sync
  if(fbOnline){
    updateSyncIndicator(true);
    fbPut('orders',v)
      .then(()=>updateSyncIndicator(false))
      .catch(()=>{fbOnline=false;updateSyncIndicator(false);});
  }
}
function getSettings(){return LS.get('qamra_settings',{pin:'9999',name:'شاهي قمرا'});}
function saveSettings(v){LS.set('qamra_settings',v);}
function getCategories(){return LS.get('qamra_cats',CATS);}

async function pullOrdersFromFB(){
  if(!fbOnline)return;
  try{
    const data=await fbGet('orders');
    if(Array.isArray(data)&&data.length){
      LS.set('qamra_orders',data);
    }
  }catch{fbOnline=false;updateSyncIndicator();}
}

function newOrderId(){
  const o=getOrders();
  return o.length?Math.max(...o.map(x=>x.id))+1:1;
}
function tableStatus(id){
  const o=getOrders().find(x=>x.tableId===id&&['new','prep','ready'].includes(x.status));
  if(!o)return'free';
  return o.status==='ready'?'ready':'occ';
}
function tableActiveOrder(id){
  return getOrders().find(x=>x.tableId===id&&['new','prep','ready'].includes(x.status))||null;
}

/* ════════════════════════════════════════════════════════
   CART KEY (item + options combo)
════════════════════════════════════════════════════════ */
function makeCartKey(itemId, opts){
  if(!opts||Object.keys(opts).length===0)return itemId;
  return itemId+'__'+Object.entries(opts).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>`${k}:${v}`).join('|');
}

function optsDiff(item, opts){
  const groups=getItemOpts(item);
  if(!groups||!opts)return 0;
  let extra=0;
  groups.forEach(g=>{
    const chosen=opts[g.id];
    if(chosen){
      const ch=g.choices.find(c=>c.id===chosen);
      if(ch&&ch.diff)extra+=ch.diff;
    }
  });
  return extra;
}

function optsLabel(item, opts){
  const groups=getItemOpts(item);
  if(!groups||!opts||Object.keys(opts).length===0)return '';
  const parts=[];
  groups.forEach(g=>{
    const chosen=opts[g.id];
    if(chosen){
      const ch=g.choices.find(c=>c.id===chosen);
      if(ch)parts.push(ch.name);
    }
  });
  return parts.join(' · ');
}

function showHome(){
  document.getElementById('home').style.display='';
  document.getElementById('pin').style.display='none';
  document.getElementById('app').style.display='none';
  S.role=null;S.nav=[];S.cart={};
  stopRefresh();
}
function startRole(role){
  if(role==='admin'){S.pinBuf='';document.getElementById('pin-disp').textContent='';document.getElementById('pin-err').textContent='';
    document.getElementById('home').style.display='none';document.getElementById('pin').style.display='flex';return;}
  S.role=role;openApp();
  if(role==='waiter')navigate('tables');
  else if(role==='kitchen')navigate('kitchen');
  else if(role==='cashier')navigate('cashier');
}
function pinKey(d){
  if(S.pinBuf.length>=6)return;
  S.pinBuf+=d;
  document.getElementById('pin-disp').textContent='●'.repeat(S.pinBuf.length);
  if(S.pinBuf.length>=4)checkPin();
}
function pinDel(){S.pinBuf=S.pinBuf.slice(0,-1);document.getElementById('pin-disp').textContent='●'.repeat(S.pinBuf.length);}
function checkPin(){
  if(S.pinBuf===String(getSettings().pin)){
    document.getElementById('pin').style.display='none';
    S.role='admin';openApp();navigate('admin');
  }else{
    setTimeout(()=>{document.getElementById('pin-err').textContent='❌ الرمز غير صحيح';S.pinBuf='';document.getElementById('pin-disp').textContent='';},200);
  }
}
function openApp(){
  document.getElementById('home').style.display='none';
  document.getElementById('pin').style.display='none';
  const a=document.getElementById('app');a.style.display='flex';a.style.flexDirection='column';
}
function navigate(screen,params={}){S.nav.push({screen,params});render(screen,params);}
function goBack(){
  if(S.nav.length<=1){showHome();return;}
  S.nav.pop();const prev=S.nav[S.nav.length-1];
  S.cart={};render(prev.screen,prev.params);
}
function render(screen,params={}){
  S.screen=screen;
  document.getElementById('main').scrollTop=0;
  const fab=document.querySelector('.cart-fab');if(fab)fab.remove();
  stopRefresh();
  switch(screen){
    case'tables':renderTables();break;
    case'table-detail':renderTableDetail(params.tableId);break;
    case'menu':S.tableId=params.tableId;renderMenu();break;
    case'kitchen':renderKitchen();startRefresh();break;
    case'cashier':renderCashier();startRefresh();break;
    case'admin':renderAdmin();break;
    default:renderTables();
  }
}

function renderTables(){
  setTitle('الطاولات',roleName());showBack(false);
  setTopRight(`<span class="sync-dot" id="sync-dot"></span><button class="tb-icon-btn" onclick="showHome()">🏠</button>`);
  updateSyncIndicator();
  const tables=getTables().filter(t=>t.active);
  const fOpts=[{id:'all',n:'الكل'},{id:'free',n:'فارغة'},{id:'occ',n:'مشغولة'},{id:'ready',n:'جاهزة'}];
  const filtered=S.tableFilter==='all'?tables:tables.filter(t=>tableStatus(t.id)===S.tableFilter);
  let html=`<div class="tables-header">${fOpts.map(f=>`<button class="filter-chip ${S.tableFilter===f.id?'on':''}" onclick="setTblFilter('${f.id}')">${f.n}</button>`).join('')}</div>`;
  if(!filtered.length)html+=`<div class="empty"><div class="ei">🪑</div><p>لا توجد طاولات</p></div>`;
  else{
    html+=`<div class="tgrid">${filtered.map(t=>{
      const st=tableStatus(t.id);
      const active=tableActiveOrder(t.id);
      const cls=st==='free'?'':st==='occ'?'occ':st==='ready'?'ready':'pay';
      const stTxt=st==='free'?'فارغة':st==='occ'?'مشغولة':st==='ready'?'جاهز!':'';
      const amt=active?`${orderTotal(active)} ر.س`:'';
      return `<div class="tc ${cls}" onclick="onTableClick(${t.id})">
        <div class="tnum">${t.id}</div><div class="tname">${t.name}</div>
        <div class="tdot"></div><div class="tstat">${stTxt}</div>
        ${amt?`<div class="tamt">${amt}</div>`:''}
      </div>`;
    }).join('')}</div>`;
  }
  document.getElementById('main').innerHTML=html;
}
function setTblFilter(f){S.tableFilter=f;renderTables();}
function onTableClick(id){
  const active=tableActiveOrder(id);
  if(active)navigate('table-detail',{tableId:id});
  else{S.cart={};navigate('menu',{tableId:id});}
}

      </div>
    </div>`;
}
function optsLabelFromData(opts){
  if(!opts)return'';

function addToOrder(tid){S.cart={};navigate('menu',{tableId:tid,addingTo:tableActiveOrder(tid)?.id});}

/* No-options direct add */
function directAdd(id,price){
  const key=id;
  if(!S.cart[key])S.cart[key]={itemId:id,qty:0,price,opts:{}};
  S.cart[key].qty++;
  renderMenu();
}
function directMinus(id,price){
  const key=id;
  if(!S.cart[key])return;
  S.cart[key].qty--;
  if(S.cart[key].qty<=0)delete S.cart[key];
  renderMenu();
}

/* ════════════════════════════════════════════════════════
   OPTIONS SHEET
════════════════════════════════════════════════════════ */
function openOpts(itemId){
  const items=getItems();
  const item=items.find(i=>i.id===itemId);
  if(!item)return;
  const groups=getItemOpts(item);
  S.optsItem=item;
  S.optsQty=1;
  // Default selections: first choice for required groups
  S.optsSelections={};
  if(groups)groups.forEach(g=>{if(g.required&&g.choices.length)S.optsSelections[g.id]=g.choices[0].id;});
  // If no options, just add directly
  if(!groups||groups.length===0){directAdd(itemId,item.p);return;}
  // Render sheet
  document.getElementById('os-name').textContent=item.n;
  document.getElementById('os-price').textContent=`${item.p} ر.س`;
  const imgWrap=document.getElementById('os-img-wrap');
  imgWrap.innerHTML=item.img?`<img src="${item.img}" class="os-img" alt="${item.n}">`:
    `<div class="os-img-ph">🍽️</div>`;
  renderOptsBody(item,groups);
  document.getElementById('opts-ovl').classList.add('open');
}

function renderOptsBody(item,groups){
  let html='';
  groups.forEach(g=>{
    html+=`<div class="opt-group">
      <div class="og-label">${g.name} <span class="${g.required?'og-req':'og-opt'}">${g.required?'مطلوب':'اختياري'}</span></div>
      <div class="choices-row">
        ${g.choices.map(c=>`
          <button class="oc ${S.optsSelections[g.id]===c.id?'sel':''}"
            onclick="selectOpt('${g.id}','${c.id}')">
            ${c.name}${c.diff>0?`<span class="oc-diff"> +${c.diff}</span>`:''}
          </button>`).join('')}
      </div>
    </div>`;
  });
  // Qty selector
  html+=`<div class="opt-group">
    <div class="og-label">الكمية</div>
    <div class="qty-row">
      <span class="qty-lbl">عدد الأصناف</span>
      <div class="qty-ctrl">
        <button class="qs-btn" onclick="changeOptsQty(-1)">−</button>
        <span class="qs-num" id="opts-qty">${S.optsQty}</span>
        <button class="qs-btn" onclick="changeOptsQty(1)">+</button>
      </div>
    </div>
  </div>`;
  document.getElementById('opts-body').innerHTML=html;
  updateOptsAddBtn();
}

function selectOpt(groupId,choiceId){
  S.optsSelections[groupId]=choiceId;
  const item=S.optsItem;
  const groups=getItemOpts(item);
  renderOptsBody(item,groups);
}

function changeOptsQty(delta){
  S.optsQty=Math.max(1,S.optsQty+delta);
  const qEl=document.getElementById('opts-qty');
  if(qEl)qEl.textContent=S.optsQty;
  updateOptsAddBtn();
}

function updateOptsAddBtn(){
  const item=S.optsItem;
  if(!item)return;
  const groups=getItemOpts(item);
  const allRequired=!groups||groups.filter(g=>g.required).every(g=>S.optsSelections[g.id]);
  const btn=document.getElementById('os-add-btn');
  if(!btn)return;
  const diff=optsDiff(item,S.optsSelections);
  const unitPrice=item.p+diff;
  const total=unitPrice*S.optsQty;
  btn.textContent=allRequired?`إضافة ${S.optsQty>1?S.optsQty+'× ':''}· ${total} ر.س`:'اختر الخيارات المطلوبة';
  btn.disabled=!allRequired;
}

function closeOpts(){document.getElementById('opts-ovl').classList.remove('open');}

function confirmOpts(){
  const item=S.optsItem;
  if(!item)return;
  const groups=getItemOpts(item);
  // Validate required
  if(groups){
    for(const g of groups){
      if(g.required&&!S.optsSelections[g.id]){showToast('اختر '+g.name,'warn');return;}
    }
  }
  const diff=optsDiff(item,S.optsSelections);
  const unitPrice=item.p+diff;
  // Build opts labels for storage
  const optsLabels={};
  if(groups)groups.forEach(g=>{
    const ch=g.choices.find(c=>c.id===S.optsSelections[g.id]);
    if(ch)optsLabels[g.name]=ch.name;
  });
  const key=makeCartKey(item.id,S.optsSelections);
  if(S.cart[key]){S.cart[key].qty+=S.optsQty;}
  else{S.cart[key]={itemId:item.id,qty:S.optsQty,price:unitPrice,opts:optsLabels,optsRaw:S.optsSelections};}
  closeOpts();
  showToast(`✅ أضيف ${item.n} × ${S.optsQty}`);
  renderMenu();
}

/* ════════════════════════════════════════════════════════
   CART
════════════════════════════════════════════════════════ */
function cartTotalCount(){return Object.values(S.cart).reduce((a,v)=>a+v.qty,0);}
function cartTotalAmt(){return Object.values(S.cart).reduce((s,v)=>s+(v.price*v.qty),0);}

function updateCartFab(){
  let fab=document.querySelector('.cart-fab');
  const count=cartTotalCount();
  if(!count){if(fab)fab.remove();return;}
  if(!fab){fab=document.createElement('button');fab.className='cart-fab';fab.onclick=openCart;document.body.appendChild(fab);}
  fab.innerHTML=`🛒 الطلب · ${count} صنف · ${cartTotalAmt()} ر.س`;
}

function openCart(){
  const entries=Object.entries(S.cart);
  if(!entries.length){showToast('السلة فارغة','warn');return;}
  let html=entries.map(([key,ci])=>{
    const optsText=ci.opts&&Object.keys(ci.opts).length?Object.entries(ci.opts).map(([k,v])=>`${k}: ${v}`).join(' · '):'';
    return `<div class="ci">
      <div class="ci-top">
        <div class="ci-ctrl">
          <button class="ciq" onclick="cartChange('${key}',-1)">−</button>
          <span class="cin">${ci.qty}</span>
          <button class="ciq plus" onclick="cartChange('${key}',1)">+</button>
        </div>
        <div class="ci-name" style="margin-right:.4rem">${getItemName(ci.itemId)}</div>
        <div class="ci-price">${ci.price*ci.qty} ر.س</div>
      </div>
      ${optsText?`<div class="ci-opts">${optsText}</div>`:''}
    </div>`;
  }).join('');
  document.getElementById('cart-items').innerHTML=html;
  document.getElementById('cart-note').value='';
  document.getElementById('cart-total-amt').textContent=`${cartTotalAmt()} ر.س`;
  document.getElementById('cs-title').textContent=`🛒 طاولة ${S.tableId}`;
  document.getElementById('cart-ovl').classList.add('open');
}
function closeCart(){document.getElementById('cart-ovl').classList.remove('open');}
function cartChange(key,delta){
  if(!S.cart[key])return;
  S.cart[key].qty+=delta;
  if(S.cart[key].qty<=0)delete S.cart[key];
  updateCartFab();
  if(!cartTotalCount()){closeCart();return;}
  openCart();
}
function getItemName(id){const it=getItems().find(i=>i.id===id);return it?it.n:id;}

function sendOrder(){
  if(!cartTotalCount()){showToast('لا يوجد أصناف','warn');return;}
  const nav=S.nav[S.nav.length-1];
  const addingTo=nav?.params?.addingTo;
  const cartItems=Object.values(S.cart).map(ci=>({
    id:ci.itemId,qty:ci.qty,price:ci.price,
    name:getItemName(ci.itemId),opts:ci.opts||{},optsRaw:ci.optsRaw||{}
  }));
  if(addingTo){
    const orders=getOrders();const idx=orders.findIndex(o=>o.id===addingTo);
    if(idx>=0){
      cartItems.forEach(ni=>{
        const ex=orders[idx].items.find(oi=>oi.id===ni.id&&JSON.stringify(oi.optsRaw||{})==JSON.stringify(ni.optsRaw||{}));
        if(ex)ex.qty+=ni.qty;else orders[idx].items.push(ni);
      });
      const noteVal=document.getElementById('cart-note').value.trim();
      if(noteVal)orders[idx].notes=(orders[idx].notes?orders[idx].notes+' | ':'')+noteVal;
      saveOrders(orders);closeCart();S.cart={};updateCartFab();
      showToast('✅ أضيفت الأصناف للطلب');goBack();goBack();return;
    }
  }
  const order={
    id:newOrderId(),tableId:S.tableId,items:cartItems,
    notes:document.getElementById('cart-note').value.trim(),
    status:'new',createdAt:Date.now(),itemsDone:{}
  };
  const orders=getOrders();orders.push(order);saveOrders(orders);
  closeCart();S.cart={};updateCartFab();
  showToast('✅ تم إرسال الطلب للمطبخ!');
  setTimeout(()=>goBack(),500);
}

let refreshInterval=null;
function startRefresh(){stopRefresh();refreshInterval=setInterval(async()=>{await pullOrdersFromFB();if(S.screen==='kitchen')renderKitchenContent();else if(S.screen==='cashier')renderCashierContent();},4000);}
function stopRefresh(){if(refreshInterval){clearInterval(refreshInterval);refreshInterval=null;}}

function renderKitchen(){
  setTitle('المطبخ','الطلبات الواردة');showBack(false);
  setTopRight(`<span class="sync-dot" id="sync-dot"></span><button class="tb-icon-btn" onclick="showHome()">🏠</button>`);
  updateSyncIndicator();
  document.getElementById('main').innerHTML=`
    <div class="k-toolbar">
      <button class="filter-chip ${S.kitchenFilter==='active'?'on':''}" onclick="setKF('active')">🔥 نشطة</button>
      <button class="filter-chip ${S.kitchenFilter==='all'?'on':''}" onclick="setKF('all')">الكل</button>
      <button class="filter-chip ${S.kitchenFilter==='ready'?'on':''}" onclick="setKF('ready')">✅ جاهزة</button>
    </div>
    <div id="kitchen-orders"></div>`;
  renderKitchenContent();
}
function setKF(f){S.kitchenFilter=f;renderKitchenContent();}

function renderKitchenContent(){
  const orders=getOrders();
  const tables=getTables();
  let list=orders.filter(o=>{
    if(S.kitchenFilter==='active')return['new','prep'].includes(o.status);
    if(S.kitchenFilter==='ready')return o.status==='ready';
    return['new','prep','ready'].includes(o.status);
  }).sort((a,b)=>a.createdAt-b.createdAt);
  const el=document.getElementById('kitchen-orders');
  if(!el)return;
  if(!list.length){el.innerHTML=`<div class="empty"><div class="ei">✅</div><p>لا توجد طلبات</p></div>`;return;}
  el.innerHTML=list.map(o=>{
    const tbl=tables.find(t=>t.id===o.tableId);
    const stCls={new:'ks-new pulse',prep:'ks-prep',ready:'ks-ready'}[o.status]||'';
    const stTxt={new:'جديد 🔴',prep:'جارٍ 🔥',ready:'جاهز ✅'}[o.status]||'';
    const mins=Math.floor((Date.now()-o.createdAt)/60000);
    const isUrgent=mins>=10&&o.status!=='ready';
    const iHtml=o.items.map(oi=>{
      const done=o.itemsDone&&o.itemsDone[oi.id+JSON.stringify(oi.optsRaw||{})];
      const optsText=oi.opts&&Object.keys(oi.opts).length?Object.values(oi.opts).join(' · '):'';
      const doneKey=encodeURIComponent(oi.id+JSON.stringify(oi.optsRaw||{}));
      return `<div class="koi ${done?'done':''}">
        <div class="koi-qty">${oi.qty}</div>
        <div class="koi-info">
          <div class="koi-name">${oi.name||oi.id}</div>
          ${optsText?`<div class="koi-opts">📌 ${optsText}</div>`:''}
        </div>
        <button class="item-chk ${done?'done':''}" onclick="toggleItemDone(${o.id},'${doneKey}')">${done?'✓':'✓?'}</button>
      </div>`;
    }).join('');
    return `<div class="kord ${o.status}">
      <div class="kord-head">
        <span class="kord-title">${tbl?tbl.name:'طاولة '+o.tableId} — #${o.id}</span>
        <div style="display:flex;gap:.35rem;align-items:center">
          <span class="k-elapsed ${isUrgent?'urgent':''}">${mins}د</span>
          <span class="kstatus ${stCls}">${stTxt}</span>
        </div>
      </div>
      <div class="kord-items">${iHtml}</div>
      ${o.notes?`<div class="kord-note">📝 ${o.notes}</div>`:''}
      <div class="kord-foot">
        ${o.status!=='ready'?
          `<button class="k-btn k-ready-btn" onclick="setOrderSt(${o.id},'ready')">✅ جاهز</button>
           ${o.status==='new'?`<button class="k-btn k-prep-btn" onclick="setOrderSt(${o.id},'prep')">🔥 بدأ</button>`:''}`:
          `<button class="k-btn" style="background:var(--muted);color:#fff" onclick="setOrderSt(${o.id},'prep')">↩ إعادة</button>`}
        <button class="k-cancel-btn" onclick="cancelOrd(${o.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function toggleItemDone(orderId,doneKey){
  const orders=getOrders();const idx=orders.findIndex(o=>o.id===orderId);
  if(idx<0)return;
  if(!orders[idx].itemsDone)orders[idx].itemsDone={};
  orders[idx].itemsDone[doneKey]=!orders[idx].itemsDone[doneKey];
  saveOrders(orders);renderKitchenContent();
}
function setOrderSt(id,st){
  const orders=getOrders();const idx=orders.findIndex(o=>o.id===id);
  if(idx>=0){orders[idx].status=st;saveOrders(orders);}renderKitchenContent();
}
function cancelOrd(id){
  if(!confirm('إلغاء الطلب؟'))return;
  const orders=getOrders();const idx=orders.findIndex(o=>o.id===id);
  if(idx>=0){orders[idx].status='cancelled';saveOrders(orders);}
  showToast('تم الإلغاء','err');renderKitchenContent();
}

function selPay(m){

function confirmPay(){

function renderDash(){
  const orders=getOrders();
  const today=new Date();today.setHours(0,0,0,0);
  const todayO=orders.filter(o=>o.createdAt>=today.getTime());
  const todayPaid=todayO.filter(o=>o.status==='paid');
  const rev=todayPaid.reduce((s,o)=>s+orderTotal(o),0);
  const active=orders.filter(o=>['new','prep','ready'].includes(o.status));
  const tables=getTables().filter(t=>t.active);
  const occ=tables.filter(t=>tableStatus(t.id)!=='free');
  const recent=orders.filter(o=>o.status==='paid').slice(-5).reverse();
  return `
    <div class="stats-grid">
      <div class="scard"><div class="snum">${rev}</div><div class="slbl">إيرادات اليوم (ر.س)</div></div>
      <div class="scard"><div class="snum">${todayPaid.length}</div><div class="slbl">طلبات مدفوعة</div></div>
      <div class="scard"><div class="snum">${active.length}</div><div class="slbl">طلبات نشطة</div></div>
      <div class="scard"><div class="snum">${occ.length}/${tables.length}</div><div class="slbl">طاولات مشغولة</div></div>
    </div>
    <div class="sec-hd"><span class="sec-ttl">آخر المدفوعات</span></div>
    ${recent.length?recent.map(o=>{
      const t=getTables().find(x=>x.id===o.tableId);
      return `<div class="arow"><div class="arow-ph">🧾</div><div class="ar-info">
        <div class="ar-name">${t?t.name:'طاولة '+o.tableId} — #${o.id}</div>
        <div class="ar-cat">${timeAgo(o.paidAt||o.createdAt)}</div>
      </div><div style="font-weight:800;color:var(--gold)">${orderTotal(o)} ر.س</div></div>`;
    }).join(''):`<div class="empty" style="padding:1rem"><p>لا توجد مدفوعات</p></div>`}`;
}

          <button class="dbtn" onclick="delItem('${item.id}')">🗑️</button>
        </div>
      </div>`).join('')||`<div class="empty" style="padding:1rem"><p>لا توجد أصناف</p></div>`}`;
}
function setAdCat(c){S.adminCat=c;renderAdmin();}
function toggleAvail(id){const items=getItems();const idx=items.findIndex(i=>i.id===id);if(idx>=0){items[idx].available=items[idx].available===false;saveItems(items);}renderAdmin();}
function delItem(id){if(!confirm('حذف الصنف؟'))return;saveItems(getItems().filter(i=>i.id!==id));showToast('🗑️ تم الحذف','warn');renderAdmin();}
function editItem(id){
  const item=getItems().find(i=>i.id===id);if(!item)return;
  const cats=getCategories();
  showModal(`<h3>✏️ تعديل صنف</h3>
    <div class="ff"><label>الاسم</label><input class="fi" id="ei-n" value="${item.n}"></div>
    <div class="ff"><label>السعر</label><input class="fi" type="number" id="ei-p" value="${item.p}"></div>
    <div class="ff"><label>التصنيف</label><select class="fi" id="ei-c">${cats.map(c=>`<option value="${c.id}" ${item.c===c.id?'selected':''}>${c.e} ${c.n}</option>`).join('')}</select></div>
    <div class="ff"><label>رابط الصورة</label><input class="fi" id="ei-img" value="${item.img||''}"></div>
    <div class="ma"><button class="btn-s" onclick="closeModal()">إلغاء</button><button class="btn-p" onclick="saveEdit('${id}')">💾 حفظ</button></div>`);
}
function saveEdit(id){
  const items=getItems();const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  items[idx].n=document.getElementById('ei-n').value.trim()||items[idx].n;
  items[idx].p=parseFloat(document.getElementById('ei-p').value)||items[idx].p;
  items[idx].c=document.getElementById('ei-c').value;
  items[idx].img=document.getElementById('ei-img').value.trim();
  saveItems(items);closeModal();showToast('✅ تم الحفظ');renderAdmin();
}
function addItem(){
  const cats=getCategories();
  showModal(`<h3>➕ صنف جديد</h3>
    <div class="ff"><label>الاسم</label><input class="fi" id="ni-n" placeholder="اسم الصنف"></div>
    <div class="ff"><label>السعر (ر.س)</label><input class="fi" type="number" id="ni-p" placeholder="0"></div>
    <div class="ff"><label>التصنيف</label><select class="fi" id="ni-c">${cats.map(c=>`<option value="${c.id}">${c.e} ${c.n}</option>`).join('')}</select></div>
    <div class="ff"><label>رابط الصورة</label><input class="fi" id="ni-img" placeholder="https://..."></div>
    <div class="ma"><button class="btn-s" onclick="closeModal()">إلغاء</button><button class="btn-p" onclick="saveNew()">✅ إضافة</button></div>`);
}
function saveNew(){
  const n=document.getElementById('ni-n').value.trim();
  const p=parseFloat(document.getElementById('ni-p').value);
  if(!n||isNaN(p)){showToast('أدخل الاسم والسعر','warn');return;}
  const items=getItems();
  items.push({id:'ci'+Date.now(),n,p,c:document.getElementById('ni-c').value,img:document.getElementById('ni-img').value.trim(),available:true});
  saveItems(items);closeModal();showToast('✅ أضيف الصنف');renderAdmin();
}

function renderAdTables(){
  const tables=getTables();
  return `<div class="sec-hd"><span class="sec-ttl">الطاولات (${tables.length})</span><button class="btn-add" onclick="addTbl()">+ طاولة</button></div>
    ${tables.map(t=>`<div class="arow">
      <div style="font-size:1.3rem;font-weight:900;color:var(--gold);min-width:2rem">${t.id}</div>
      <input class="fi" style="flex:1;padding:.38rem .7rem" value="${t.name}" id="tn-${t.id}" onchange="saveTblName(${t.id})">
      <button class="tbtn" onclick="toggleTbl(${t.id})" style="color:${t.active?'var(--grn)':'var(--red)'}">${t.active?'✅':'⛔'}</button>
      <button class="dbtn" onclick="removeTbl(${t.id})">🗑️</button>
    </div>`).join('')}`;
}
function saveTblName(id){const t=getTables();const i=t.findIndex(x=>x.id===id);if(i>=0){t[i].name=document.getElementById(`tn-${id}`).value.trim()||t[i].name;saveTables(t);}}
function toggleTbl(id){const t=getTables();const i=t.findIndex(x=>x.id===id);if(i>=0){t[i].active=!t[i].active;saveTables(t);}renderAdmin();}
function addTbl(){const t=getTables();const nid=Math.max(...t.map(x=>x.id),0)+1;t.push({id:nid,name:`طاولة ${nid}`,active:true});saveTables(t);showToast(`✅ طاولة ${nid}`);renderAdmin();}
function removeTbl(id){if(!confirm('حذف الطاولة؟'))return;saveTables(getTables().filter(t=>t.id!==id));renderAdmin();}

function renderAdOrders(){
  const orders=getOrders();
  const fOpts=[{id:'all',n:'الكل'},{id:'active',n:'نشطة'},{id:'paid',n:'مدفوعة'},{id:'cancelled',n:'ملغاة'}];
  const fKey=S.kitchenFilter||'all';
  const list=orders.filter(o=>{
    if(fKey==='active')return['new','prep','ready'].includes(o.status);
    if(fKey==='paid')return o.status==='paid';
    if(fKey==='cancelled')return o.status==='cancelled';
    return true;
  }).reverse();
  return `<div class="sec-hd"><span class="sec-ttl">جميع الطلبات (${list.length})</span></div>
    <div style="display:flex;gap:.4rem;margin-bottom:.85rem;overflow-x:auto">
      ${fOpts.map(f=>`<button class="filter-chip ${fKey===f.id?'on':''}" onclick="setKF('${f.id}');setAdTab('orders')">${f.n}</button>`).join('')}
    </div>
    ${list.map(o=>{
      const tbl=getTables().find(t=>t.id===o.tableId);
      const stC={new:'ks-new',prep:'ks-prep',ready:'ks-ready',paid:'ks-paid'}[o.status]||'';
      const stT={new:'جديد',prep:'جارٍ',ready:'جاهز',paid:'مدفوع',cancelled:'ملغي'}[o.status]||o.status;
      return `<div class="arow" style="align-items:flex-start">
        <div class="arow-ph">🧾</div>
        <div class="ar-info">
          <div class="ar-name">${tbl?tbl.name:'طاولة '+o.tableId} — #${o.id}</div>
          <div class="ar-cat">${timeAgo(o.createdAt)}</div>
          <div style="font-size:.7rem;color:var(--muted);margin-top:.2rem">${o.items.map(oi=>oi.qty+'× '+oi.name).join(', ')}</div>
        </div>
        <div style="text-align:left;flex-shrink:0">
          <div style="font-weight:800;color:var(--gold)">${orderTotal(o)} ر.س</div>
          <span class="kstatus ${stC}" style="margin-top:.2rem;display:inline-block">${stT}</span>
          ${['new','prep','ready'].includes(o.status)?`<div style="margin-top:.3rem"><button class="pay-btn" style="font-size:.7rem;padding:.18rem .45rem" onclick="openPayModal(${o.id})">دفع</button></div>`:''}
        </div>
      </div>`;
    }).join('')||`<div class="empty" style="padding:1rem"><p>لا توجد طلبات</p></div>`}`;
}

function renderAdSettings(){
  const s=getSettings();
  return `<div class="sec-hd"><span class="sec-ttl">إعدادات الكافيه</span></div>
    <div class="ff"><label>اسم الكافيه</label><input class="fi" id="st-name" value="${s.name||'شاهي قمرا'}"></div>
    <div class="ff"><label>رمز الدخول (PIN)</label><input class="fi" type="number" id="st-pin" value="${s.pin||'9999'}"></div>
    <div class="ff"><label>رابط Firebase Database</label><input class="fi" id="st-fb" value="${FB_URL}" disabled style="font-size:.72rem;color:var(--muted)"></div>
    <div style="background:var(--ora-bg);border:1px solid rgba(196,123,8,.2);border-radius:8px;padding:.65rem;font-size:.73rem;color:var(--ora);margin:.5rem 0">
      ⚠️ لتفعيل المزامنة: اذهب لـ Firebase Console → Realtime Database → Rules واجعل read/write = true
    </div>
    <button class="btn-p" style="width:100%;margin:.75rem 0" onclick="saveSet()">💾 حفظ</button>
    <div class="sep"></div>
    <div class="sec-hd" style="margin-top:.75rem"><span class="sec-ttl" style="color:var(--red)">منطقة الخطر</span></div>
    <button class="btn-d" style="width:100%;margin-bottom:.5rem" onclick="clearOrders()">🗑️ حذف جميع الطلبات</button>
    <button style="width:100%;background:none;border:1.5px solid var(--red);color:var(--red);border-radius:8px;padding:.6rem;font-size:.83rem;cursor:pointer" onclick="resetMenu()">↩ استعادة المنيو الأصلي</button>`;
}
function saveSet(){
  const s=getSettings();
  s.name=document.getElementById('st-name').value.trim()||'شاهي قمرا';
  const pin=document.getElementById('st-pin').value.trim();
  if(pin.length>=4)s.pin=pin;
  saveSettings(s);showToast('✅ تم الحفظ');
}
function clearOrders(){if(!confirm('حذف كل الطلبات؟'))return;saveOrders([]);showToast('🗑️ تم','err');renderAdmin();}
function resetMenu(){if(!confirm('استعادة المنيو الأصلي؟'))return;saveItems(DEFAULT_ITEMS);showToast('✅ تم');renderAdmin();}

/* ════════════════════════════════════════════════════════
   MODAL / HELPERS
════════════════════════════════════════════════════════ */
function showModal(h){document.getElementById('modal-box').innerHTML=h;document.getElementById('modal-ovl').classList.add('open');}
function closeModal(){document.getElementById('modal-ovl').classList.remove('open');}
function setTitle(m,s=''){document.getElementById('tb-title').textContent=m;document.getElementById('tb-sub').textContent=s;}
function showBack(v){const b=document.getElementById('tb-back-btn');b.style.opacity=v?'1':'0';b.style.pointerEvents=v?'':'none';}
function setTopRight(h){document.getElementById('tb-right').innerHTML=h;updateSyncIndicator();}
function roleName(){return{waiter:'النادل',kitchen:'المطبخ',cashier:'الكاشير',admin:'الإدارة'}[S.role]||'';}
function orderTotal(o){return o.items.reduce((s,oi)=>s+(oi.price*oi.qty),0);}
function timeAgo(ts){const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'الآن';if(m<60)return`${m}د`;return`${Math.floor(m/60)}س`;}
let toastTo;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=`toast show${type==='err'?' err':type==='warn'?' warn':''}`;
  clearTimeout(toastTo);toastTo=setTimeout(()=>t.classList.remove('show'),2700);
}

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
checkFbConnection().then(()=>{
  pullOrdersFromFB();
  setInterval(checkFbConnection,30000);
});
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
window.addEventListener('storage',e=>{
  if(e.key==='qamra_orders'){
    if(S.screen==='kitchen')renderKitchenContent();
    else if(S.screen==='cashier')renderCashierContent();
  }
});
</script>
</body>
